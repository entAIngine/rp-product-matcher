const HIDDEN_COMP_FIELDS = new Set(['Positionsnummer','Verkaufstext','Artikelnummer','DesiredSupplyType','Mounting:AllowedMethods','Mounting:EnforcedMethods','Warnings','Evidence','Produkttyp']);

// ── Frontend comparison normalization ──
// Re-evaluates "different" statuses from the backend for known equivalences
const _MATERIAL_FAMILY_PATTERNS = {
  kunststoff: [
    /\bkunststoff\b/, /\bplastic\b/, /\bpolycarbon(?:ate|at)\b/, /\babs\b/,
    /\bpmma\b/, /\bacryl(?:ic)?\b/, /\bplexi(?:glas)?\b/,
  ],
  metall: [
    /\bmetall\b/, /\bmetal\b/, /\bzinc\b/, /\bzink\b/,
    /\baluminium\b/, /\baluminum\b/, /\bstahl\b/, /\bsteel\b/,
    /\bedelstahl\b/, /\bstainless\s+steel\b/,
  ],
  glas: [
    /\bglas\b/, /\bglass\b/,
  ],
};

function _normalizeMaterialValue(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .toLowerCase()
    .replace(/[+;/()]/g, ' ')
    .replace(/[_-]+/g, ' ')
    .replace(/\s*,\s*/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function _materialFamilies(value) {
  const normalized = _normalizeMaterialValue(value);
  const families = new Set();
  if (!normalized) return families;
  Object.entries(_MATERIAL_FAMILY_PATTERNS).forEach(([family, patterns]) => {
    if (patterns.some(pattern => pattern.test(normalized))) families.add(family);
  });
  return families;
}

function _materialFamilySetsEqual(left, right) {
  if (left.size !== right.size) return false;
  return Array.from(left).every(value => right.has(value));
}

function _singleMaterialFamilyMatches(singleFamilySet, otherFamilySet) {
  const [family] = Array.from(singleFamilySet);
  if (!family || !otherFamilySet.size) return false;
  if (family === 'metall') return otherFamilySet.has('metall') && !otherFamilySet.has('kunststoff');
  if (family === 'kunststoff') return otherFamilySet.has('kunststoff') && !otherFamilySet.has('metall');
  return otherFamilySet.size === 1 && otherFamilySet.has(family);
}

function _materialsEquivalent(queryValue, candidateValue) {
  const queryNorm = _normalizeMaterialValue(queryValue);
  const candidateNorm = _normalizeMaterialValue(candidateValue);
  if (!queryNorm || !candidateNorm) return false;
  if (queryNorm === candidateNorm) return true;

  const queryFamilies = _materialFamilies(queryValue);
  const candidateFamilies = _materialFamilies(candidateValue);
  if (!queryFamilies.size || !candidateFamilies.size) return false;
  if (_materialFamilySetsEqual(queryFamilies, candidateFamilies)) return true;
  if (queryFamilies.size === 1 && _singleMaterialFamilyMatches(queryFamilies, candidateFamilies)) return true;
  if (candidateFamilies.size === 1 && _singleMaterialFamilyMatches(candidateFamilies, queryFamilies)) return true;
  return false;
}
const _NUMERIC_FIELDS = new Set([
  'HousingDimensions:Height', 'HousingDimensions:Length', 'HousingDimension:Width',
  'RatingsCertifications:RecognitionDistance',
  'ElectronicPerformanceData:LuminousFluxMains', 'ElectronicPerformanceData:LuminousFluxEmergency',
  'ElectronicBackupTimes:MaxBackupTime',
]);
const _IK_IP_FIELDS = new Set(['RatingsCertifications:IKclass', 'RatingsCertifications:IngressProtection']);
const _TYPE_FIELDS = new Set(['Produkttyp', 'RatingsCertifications:LuminaireType']);
const _DIMENSION_FIELDS = ['HousingDimensions:Height', 'HousingDimensions:Length', 'HousingDimension:Width'];
function _normalizeTypeValue(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .toLowerCase()
    .replace(/[_-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .replace(/\bled\s+/g, '')
    .replace(/\brettungszeichen\s*-?\s*\/\s*sicherheitsleuchte\b/g, 'rettungszeichenleuchte')
    .replace(/\brettungszeichen\s+leuchte\b/g, 'rettungszeichenleuchte')
    .replace(/\bsicherheits\s+leuchte\b/g, 'sicherheitsleuchte')
    .replace(/\bnot\s+leuchte\b/g, 'notleuchte')
    .replace(/\s+/g, ' ')
    .trim();
}
const _OVERVIEW_SECONDARY_FIELDS = new Set([
  ..._DIMENSION_FIELDS,
  'ElectronicBackupTimes:MaxBackupTime',
  'Produkttyp',
]);
const _DIMENSION_PERMUTATIONS = [
  ['HousingDimensions:Height', 'HousingDimensions:Length', 'HousingDimension:Width'],
  ['HousingDimensions:Height', 'HousingDimension:Width', 'HousingDimensions:Length'],
  ['HousingDimensions:Length', 'HousingDimensions:Height', 'HousingDimension:Width'],
  ['HousingDimensions:Length', 'HousingDimension:Width', 'HousingDimensions:Height'],
  ['HousingDimension:Width', 'HousingDimensions:Height', 'HousingDimensions:Length'],
  ['HousingDimension:Width', 'HousingDimensions:Length', 'HousingDimensions:Height'],
];

function _parseNum(s) {
  if (s == null) return null;
  const m = String(s).replace(/,/g, '.').match(/[-+]?\d*\.?\d+/);
  return m ? parseFloat(m[0]) : null;
}
function _parseIkIp(s) {
  if (s == null) return null;
  const txt = String(s).trim();
  const m = txt.match(/(?:I[KP])\s*(\d+)/i);
  if (m) return parseInt(m[1]);
  const bare = txt.match(/^(\d+)$/);
  return bare ? parseInt(bare[1]) : null;
}
function _numEq(a, b, epsilon = 0.5) {
  return a !== null && b !== null && Math.abs(a - b) < epsilon;
}
function _sameNumericSet(left, right, epsilon = 0.5) {
  if (left.length !== right.length) return false;
  const sortedLeft = [...left].sort((a, b) => a - b);
  const sortedRight = [...right].sort((a, b) => a - b);
  return sortedLeft.every((value, idx) => _numEq(value, sortedRight[idx], epsilon));
}
function getDimensionAlignmentMap(queryFields, comparisons) {
  const queryNums = new Map();
  const candNums = new Map();

  (queryFields || []).forEach(field => {
    if (_DIMENSION_FIELDS.includes(field.field)) queryNums.set(field.field, _parseNum(field.value));
  });
  (comparisons || []).forEach(comp => {
    if (_DIMENSION_FIELDS.includes(comp.field)) candNums.set(comp.field, _parseNum(comp.candidate_value));
  });

  if (_DIMENSION_FIELDS.some(field => !queryNums.has(field) || !candNums.has(field))) return null;

  const queryVals = _DIMENSION_FIELDS.map(field => queryNums.get(field));
  const candVals = _DIMENSION_FIELDS.map(field => candNums.get(field));
  if (queryVals.some(v => v === null) || candVals.some(v => v === null)) return null;
  if (!_sameNumericSet(queryVals, candVals)) return null;

  const scorePermutation = perm => _DIMENSION_FIELDS.reduce((score, targetField, idx) => {
    return score + (_numEq(queryNums.get(targetField), candNums.get(perm[idx])) ? 1 : 0);
  }, 0);

  const identity = _DIMENSION_FIELDS;
  const identityScore = scorePermutation(identity);
  let bestPerm = identity;
  let bestScore = identityScore;

  _DIMENSION_PERMUTATIONS.forEach(perm => {
    const score = scorePermutation(perm);
    if (score > bestScore) {
      bestScore = score;
      bestPerm = perm;
    }
  });

  if (bestPerm === identity || bestScore !== _DIMENSION_FIELDS.length) return null;

  const aligned = new Map();
  _DIMENSION_FIELDS.forEach((targetField, idx) => {
    aligned.set(targetField, bestPerm[idx]);
  });
  return aligned;
}
function getDisplayProposal(proposal, queryFields) {
  const rawComparison = proposal.comparison || [];
  const rawFeatures = proposal.product_features || {};
  const comparisonByField = new Map(rawComparison.map(comp => [comp.field, comp]));
  const dimensionAlignment = getDimensionAlignmentMap(queryFields, rawComparison);

  if (!dimensionAlignment) {
    return { ...proposal, comparisonByField, displayFeatures: rawFeatures };
  }

  const alignedComparison = rawComparison.map(comp => {
    if (!_DIMENSION_FIELDS.includes(comp.field)) return comp;
    const sourceField = dimensionAlignment.get(comp.field);
    const sourceComp = comparisonByField.get(sourceField);
    if (!sourceComp) return comp;
    return {
      ...sourceComp,
      field: comp.field,
      label: comp.label || shortField(comp.field),
      query_value: comp.query_value,
      query_source: comp.query_source,
    };
  });

  const alignedComparisonByField = new Map(alignedComparison.map(comp => [comp.field, comp]));
  const alignedFeatures = { ...rawFeatures };
  _DIMENSION_FIELDS.forEach(targetField => {
    const sourceField = dimensionAlignment.get(targetField);
    if (!sourceField) return;
    if (Object.prototype.hasOwnProperty.call(alignedFeatures, sourceField)) {
      alignedFeatures[targetField] = rawFeatures[sourceField];
    }
  });

  return {
    ...proposal,
    comparison: alignedComparison,
    comparisonByField: alignedComparisonByField,
    displayFeatures: alignedFeatures,
    _dimensionAligned: true,
  };
}

function normalizeComparison(comp) {
  if (!comp) return comp;

  // Mounting: "universal" should not satisfy a specific mounting request
  if (comp.field === 'Mounting:MountingMethod') {
    const qv = comp.query_value, cv = comp.candidate_value;
    if (qv && cv) {
      const ql = String(qv).toLowerCase().trim();
      const cl = String(cv).toLowerCase().trim();
      if (ql !== 'universal' && cl === 'universal' && comp.status !== 'different') {
        return { ...comp, status: 'different', note: 'candidate uses universal mounting compatibility' };
      }
    }
  }

  if (comp.status !== 'different') return comp;
  const f = comp.field;
  const qv = comp.query_value, cv = comp.candidate_value;
  if (!qv || !cv) return comp;

  // Numeric fields: strip units, compare numbers
  if (_NUMERIC_FIELDS.has(f)) {
    const qn = _parseNum(qv), cn = _parseNum(cv);
    if (qn !== null && cn !== null && Math.abs(qn - cn) < 0.5) {
      return { ...comp, status: 'match', note: 'exact match' };
    }
    if (qn !== null && cn !== null && cn > qn) {
      return { ...comp, status: 'upgrade', note: 'candidate value is higher' };
    }
  }

  // IK/IP: parse rating with or without prefix
  if (_IK_IP_FIELDS.has(f)) {
    const qi = _parseIkIp(qv), ci = _parseIkIp(cv);
    if (qi !== null && ci !== null) {
      if (qi === ci) return { ...comp, status: 'match', note: 'exact match' };
      if (ci > qi) return { ...comp, status: 'upgrade', note: 'candidate is higher' };
    }
  }

  // Material equivalence
  if (f === 'MaterialData:Material') {
    if (_materialsEquivalent(qv, cv)) return { ...comp, status: 'match', note: 'equivalent material' };
  }

  // Product type / Luminaire type hierarchy
  if (_TYPE_FIELDS.has(f)) {
    const ql = _normalizeTypeValue(qv), cl = _normalizeTypeValue(cv);
    if (ql.includes(cl) || cl.includes(ql)) {
      return { ...comp, status: 'match', note: 'type hierarchy match' };
    }
    // Known product type hierarchy
    const _PT_FAMILY = {
      'notleuchte': ['rettungszeichenleuchte', 'sicherheitsleuchte', 'notleuchte'],
      'rettungszeichenleuchte': ['rettungszeichenleuchte', 'notleuchte'],
      'sicherheitsleuchte': ['sicherheitsleuchte', 'notleuchte'],
    };
    const qFam = _PT_FAMILY[ql] || [ql];
    const cFam = _PT_FAMILY[cl] || [cl];
    if (qFam.includes(cl) || cFam.includes(ql)) {
      return { ...comp, status: 'match', note: 'type hierarchy match' };
    }
  }

  return comp;
}

function buildFieldList(queryFields, proposals) {
  const seen = new Map();
  (queryFields || []).forEach(qf => { if (!HIDDEN_COMP_FIELDS.has(qf.field) && !seen.has(qf.field)) seen.set(qf.field, qf); });
  (proposals || []).forEach(p => {
    (p.comparison || []).forEach(c => { if (!HIDDEN_COMP_FIELDS.has(c.field) && !seen.has(c.field)) seen.set(c.field, null); });
  });
  return Array.from(seen.entries()).map(([field, qf]) => ({ field, qf }));
}

function getIssueStatusLabel(status) {
  if (currentLang === 'de') {
    if (status === 'upgrade') return 'Upgrade';
    if (status === 'different') return 'Abweichung';
    if (status === 'missing_candidate' || status === 'missing_query' || status === 'missing') return 'Fehlt';
    return 'Hinweis';
  }
  if (status === 'upgrade') return 'Upgrade';
  if (status === 'different') return 'Difference';
  if (status === 'missing_candidate' || status === 'missing_query' || status === 'missing') return 'Missing';
  return 'Note';
}

function renderOverviewIssues(issues) {
  if (!issues || !issues.length) return '';
  const primary = issues.filter(issue => !_OVERVIEW_SECONDARY_FIELDS.has(issue.field));
  const visible = primary.length ? primary : issues;
  const summaryLabel = currentLang === 'de'
    ? (visible.length === 1 ? 'Prüfpunkt anzeigen' : 'Prüfpunkte anzeigen')
    : (visible.length === 1 ? 'Show review point' : 'Show review points');
  const listItems = visible.map(issue => `
    <li class="ph-issues-item">
      <span class="ph-issues-tag ${escapeHtml(issue.status || 'different')}">${escapeHtml(getIssueStatusLabel(issue.status))}</span>
      <div class="ph-issues-text">
        <strong>${escapeHtml(formatLabelText(issue.label || formatFieldLabel(issue.field || '')))}</strong>
        <span>${escapeHtml(formatLabelText(issue.note || issue.status || ''))}</span>
      </div>
    </li>`).join('');
  return `<details class="ph-issues-panel">
    <summary class="ph-issues-summary">
      <span class="ph-issues-caret">▸</span>
      <span class="ph-issues-count">${visible.length}</span>
      <span class="ph-issues-label">${summaryLabel}</span>
    </summary>
    <ul class="ph-issues-list">${listItems}</ul>
  </details>`;
}

function renderComparisonMatrix(proposals, queryFields, itemKey) {
  if (!proposals || proposals.length === 0) {
    return `<div class="no-proposals-msg">${t('results.no_proposals')}</div>`;
  }

  const displayProposals = proposals.map(proposal => getDisplayProposal(proposal, queryFields));
  const fields = buildFieldList(queryFields, displayProposals);
  const lang = currentLang;
  const ek = escapeHtml(itemKey);

  // ── COLGROUP (enforces consistent column widths) ────────────────
  const { fname: COL_FNAME, query: COL_QUERY, proposal: COL_PROP } = getMatrixLayoutMetrics();
  const fixedWidth = COL_FNAME + COL_QUERY;
  const manuals = state.manualProducts[itemKey] || [];
  const tableMinWidth = fixedWidth + (displayProposals.length + manuals.length) * COL_PROP;
  const colGroupCols = `<col style="width:${COL_FNAME}px"><col style="width:${COL_QUERY}px">${displayProposals.map(() => `<col style="width:${COL_PROP}px">`).join('')}${manuals.map(() => `<col style="width:${COL_PROP}px">`).join('')}`;
  const overviewGridCols = `${COL_FNAME}px ${COL_QUERY}px ${displayProposals.map(() => `${COL_PROP}px`).join(' ')}${manuals.length ? ' ' + manuals.map(() => `${COL_PROP}px`).join(' ') : ''}`;

  // ── THEAD ──────────────────────────────────────────────────────
  let html = '';
  let overviewCellsHtml = '';
  html += `<table class="matrix-table" style="min-width:${tableMinWidth}px"><colgroup>${colGroupCols}</colgroup><thead><tr>
    <th class="col-fname"><div class="thead-field-label">${t('table.field')}</div></th>
    <th class="col-query"><div class="thead-query-label">${lang === 'de' ? 'Ihre Anfrage' : 'Your Inquiry'}</div></th>`;

  displayProposals.forEach((p, pi) => {
    const score = p.score ?? 0;
    const pct = Math.min(100, score * 100).toFixed(1);
    const article = p.display_article || p.base_article || '?';
    const rank = p.rank ?? (pi + 1);
    const isSel = state.selections[itemKey] === pi;
    const typeCls = (p.candidate_type || '').includes('virtual') ? 'virtual' : '';
    const typeLabel = p.candidate_type ? `<span class="ph-type-badge ${typeCls}">${escapeHtml(formatCandidateType(p.candidate_type))}</span>` : '';
    const topSelectLabel = isSel
      ? (lang === 'de' ? '\u2713\u00a0Ausgewählt' : '\u2713\u00a0Selected')
      : (lang === 'de' ? 'Auswählen' : 'Select');

    // Slim sticky header: only rank + article + score
    html += `<th class="col-proposal-th${isSel ? ' is-selected' : ''}" id="ph-${ek}-${pi}" data-col="${pi}">
      <div class="ph-inner ph-inner-slim">
        <div class="ph-head-top">
          <div class="ph-rank-row">
            <span class="ph-rank">#${rank}</span>${typeLabel}
          </div>
          <div class="ph-article">${escapeHtml(article)}</div>
        </div>
        <div class="ph-score-row">
          <div class="ph-score-bar-wrap"><div class="ph-score-bar-fill" style="width:${pct}%"></div></div>
          <span class="ph-score-num">${score.toFixed(3)} <span style="opacity:0.6;font-size:0.6rem">(${pct}%)</span></span>
        </div>
        <div class="ph-header-actions">
          <button class="ph-select-btn top-cta${isSel ? ' selected' : ''}"
            data-item="${ek}" data-pi="${pi}"
            onclick="selectProposal('${ek}',${pi},this)">
            ${topSelectLabel}
          </button>
        </div>
      </div>
    </th>`;

    // Build detail content for the info row in tbody
    // Match/diff summary counts (apply frontend normalization)
    const compCounts = { match: 0, different: 0, upgrade: 0, missing: 0 };
    (p.comparison || []).forEach(c => {
      const nc = normalizeComparison(c);
      if (nc.status === 'match') compCounts.match++;
      else if (nc.status === 'different') compCounts.different++;
      else if (nc.status === 'upgrade') compCounts.upgrade++;
      else compCounts.missing++;
    });
    let summaryHtml = '';
    if (p.comparison?.length) {
      summaryHtml = '<div class="ph-badges" style="margin-top:2px">';
      if (compCounts.match) summaryHtml += renderSummaryBadge(compCounts.match, 'summary.match_label', 'summary.match_tooltip', 'qb-match');
      if (compCounts.different) summaryHtml += renderSummaryBadge(compCounts.different, 'summary.diff_label', 'summary.diff_tooltip', 'qb-diff');
      if (compCounts.upgrade) summaryHtml += renderSummaryBadge(compCounts.upgrade, 'summary.upgrade_label', 'summary.upgrade_tooltip', 'qb-upgrade');
      if (compCounts.missing) summaryHtml += renderSummaryBadge(compCounts.missing, 'summary.missing_label', 'summary.missing_tooltip', 'qb-other');
      summaryHtml += '</div>';
    }
    // Recompute issues from normalized comparisons (backend issues_summary is not normalized)
    const normalizedIssues = [];
    (p.comparison || []).forEach(c => {
      const nc = normalizeComparison(c);
      if (nc.status !== 'match' && nc.status !== 'missing_query') {
        normalizedIssues.push({ field: nc.field, label: nc.label || shortField(nc.field), status: nc.status, note: nc.note || nc.status });
      }
    });
    const normIssuesHtml = renderOverviewIssues(normalizedIssues);
    const selCls = isSel ? ' col-selected' : '';
    overviewCellsHtml += `<div class="matrix-overview-cell${selCls}" data-col="${pi}"><div class="ph-inner">
      <div class="overview-product-head">
        <div class="overview-product-meta">
          <span class="ph-rank">#${rank}</span>${typeLabel}
        </div>
        <div class="overview-product-article">${escapeHtml(article)}</div>
      </div>
      ${summaryHtml}${normIssuesHtml}
    </div></div>`;
  });

  // ── MANUAL PRODUCT HEADERS ─────────────────────────────────────
  manuals.forEach((row, mi) => {
    const mKey = `manual:${mi}`;
    const isSel = state.selections[itemKey] === mKey;
    const selLabel = isSel
      ? (lang === 'de' ? '\u2713\u00a0Ausgewählt' : '\u2713\u00a0Selected')
      : (lang === 'de' ? 'Auswählen' : 'Select');
    html += `<th class="col-proposal-th col-manual${isSel ? ' is-selected' : ''}" id="ph-${ek}-manual-${mi}" data-col="${mKey}">
      <div class="ph-inner ph-inner-slim">
        <div class="ph-head-top">
          <span class="ph-manual-badge">${lang === 'de' ? 'Manuell' : 'Manual'}</span>
          <div class="ph-article">${escapeHtml(row['Artikelnummer'])}</div>
        </div>
        <div class="ph-header-actions">
          <button class="ph-select-btn top-cta${isSel ? ' selected' : ''}"
            data-item="${ek}" data-pi="${mKey}"
            onclick="selectProposal('${ek}','${mKey}',this)">
            ${selLabel}
          </button>
        </div>
      </div>
    </th>`;
  });
  html += `</tr></thead><tbody>`;
  const addBtnLabel = lang === 'de' ? 'Produkt manuell hinzufügen' : 'Add product manually';
  const addBtnText = lang === 'de' ? 'Manuelles Produkt' : 'Manual product';
  html = `<div class="matrix-wrapper">
    <div class="matrix-add-bar">
      <button class="add-product-btn" onclick="openAddProductPopover('${ek}',this)" title="${addBtnLabel}" aria-label="${addBtnLabel}"><span class="add-product-btn-icon">+</span>${addBtnText}</button>
    </div>
    <div class="matrix-overview" style="min-width:${tableMinWidth}px;grid-template-columns:${overviewGridCols}">
      <div class="matrix-overview-cell matrix-overview-label"><div class="col-fname-content">${lang === 'de' ? '\u00dcbersicht' : 'Overview'}</div></div>
      <div class="matrix-overview-cell matrix-overview-query">${renderQueryOverview(queryFields)}</div>
      ${overviewCellsHtml}${manuals.map(() => '<div class="matrix-overview-cell"></div>').join('')}
    </div>${html}`;

  // ── ROWS ───────────────────────────────────────────────────────
  const _ROW_GROUP_ORDER = ['fg.identity', 'fg.mounting', 'fg.protection', 'fg.dimensions', 'fg.electrical', 'fg.material', 'fg.anfrage_extra', 'fg.other'];
  fields.sort((a, b) => {
    const ga = _ROW_GROUP_ORDER.indexOf(getFieldGroup(a.field));
    const gb = _ROW_GROUP_ORDER.indexOf(getFieldGroup(b.field));
    return (ga === -1 ? 99 : ga) - (gb === -1 ? 99 : gb);
  });
  let lastGroup = null;
  fields.forEach(({ field, qf }) => {
    const group = getFieldGroup(field);
    if (group !== lastGroup) {
      html += `<tr class="group-row"><td class="group-label-cell" colspan="2">${escapeHtml(t(group))}</td><td class="group-label-fill" colspan="${proposals.length + manuals.length}"></td></tr>`;
      lastGroup = group;
    }
    const qVal = qf?.value != null ? String(qf.value) : null;
    const srcCls = qf?.source === 'extracted' ? 'extracted' : qf?.source === 'derived' ? 'derived' : 'missing';
    const qDisplay = qVal != null
      ? `<span class="qval" title="${escapeHtml(String(formatDisplayValue(field, qVal)))}">${escapeHtml(String(formatDisplayValue(field, qVal)))}</span><span class="src-dot ${srcCls}" title="${escapeHtml(String(formatLabelText(qf?.source || '')))}"></span>`
      : `<span class="qval missing">\u2014</span>`;

    html += `<tr class="field-row">
      <td class="col-fname"><div class="col-fname-content" title="${escapeHtml(formatFieldLabel(field))}">${escapeHtml(formatFieldLabel(field))}</div></td>
      <td class="col-query"><div class="col-query-content">${qDisplay}</div></td>`;

    displayProposals.forEach((p, pi) => {
      const isSel = state.selections[itemKey] === pi;
      const selCls = isSel ? ' col-selected' : '';
      const rawComp = p.comparisonByField?.get(field) || (p.comparison || []).find(c => c.field === field);
      if (!rawComp) {
        html += `<td class="cell-nodata${selCls}" data-col="${pi}"><div class="cell-inner"><span class="cell-icon" style="color:#D1D5DB">\u00b7</span><span class="cell-val" style="color:#D1D5DB" title="${lang === 'de' ? 'Kein Vergleichswert' : 'No comparison data'}">\u2014</span></div></td>`;
      } else {
        const comp = normalizeComparison(rawComp);
        const sc = comp.status === 'match' ? 'cell-match' : comp.status === 'different' ? 'cell-diff' : comp.status === 'upgrade' ? 'cell-upgrade' : 'cell-missing';
        const icon = comp.status === 'match' ? '\u2713' : comp.status === 'different' ? '\u2717' : comp.status === 'upgrade' ? '\u2191' : '\u00b7';
        const cVal = comp.candidate_value != null ? String(formatDisplayValue(field, comp.candidate_value)) : '\u2014';
        const note = comp.note ? String(formatLabelText(comp.note)) : '';
        html += `<td class="${sc}${selCls}" data-col="${pi}"><div class="cell-inner"><span class="cell-icon">${icon}</span><span class="cell-val" title="${escapeHtml(cVal + (note ? ' (' + note + ')' : ''))}">${escapeHtml(cVal)}</span></div></td>`;
      }
    });
    manuals.forEach((manualRow, mi) => {
      const mKey = `manual:${mi}`;
      const isSel = state.selections[itemKey] === mKey;
      const selCls = isSel ? ' col-selected' : '';
      if (!manualRow._comparisonByField) {
        const comps = buildManualComparison(manualRow, queryFields);
        manualRow._comparisonByField = new Map(comps.map(c => [c.field, c]));
      }
      const rawComp = manualRow._comparisonByField.get(field);
      if (!rawComp || rawComp.candidate_value == null) {
        html += `<td class="cell-nodata${selCls}" data-col="${mKey}"><div class="cell-inner"><span class="cell-icon" style="color:#D1D5DB">\u00b7</span><span class="cell-val" style="color:#D1D5DB">\u2014</span></div></td>`;
      } else {
        const comp = normalizeComparison(rawComp);
        const sc = comp.status === 'match' ? 'cell-match' : comp.status === 'different' ? 'cell-diff' : comp.status === 'upgrade' ? 'cell-upgrade' : 'cell-missing';
        const icon = comp.status === 'match' ? '\u2713' : comp.status === 'different' ? '\u2717' : comp.status === 'upgrade' ? '\u2191' : '\u00b7';
        const cVal = comp.candidate_value != null ? String(formatDisplayValue(field, comp.candidate_value)) : '\u2014';
        const note = comp.note ? String(formatLabelText(comp.note)) : '';
        html += `<td class="${sc}${selCls}" data-col="${mKey}"><div class="cell-inner"><span class="cell-icon">${icon}</span><span class="cell-val" title="${escapeHtml(cVal + (note ? ' (' + note + ')' : ''))}">${escapeHtml(cVal)}</span></div></td>`;
      }
    });
    html += '</tr>';
  });

  // ── SELECT NONE ROW ────────────────────────────────────────────
  const isNone = state.selections[itemKey] === 'none';
  html += `</tbody><tfoot><tr class="snone-row">
    <td colspan="2">
      <button class="snone-btn${isNone ? ' selected' : ''}" onclick="selectProposal('${ek}','none',this)">
        ${isNone ? '\u2713\u00a0' : ''}${t('results.select_none')}
      </button>
    </td>`;
  displayProposals.forEach((_, pi) => {
    const isSel = state.selections[itemKey] === pi;
    html += `<td style="background:#FAFAFA;border-top:2px solid #D8E2F0 !important"><div style="padding:10px 12px">
      <button class="ph-select-btn${isSel ? ' selected' : ''}" style="font-size:0.72rem"
        data-item="${ek}" data-pi="${pi}"
        onclick="selectProposal('${ek}',${pi},this)">
        ${isSel ? (currentLang === 'de' ? '\u2713\u00a0Ausgew\u00e4hlt' : '\u2713\u00a0Selected') : (currentLang === 'de' ? 'Ausw\u00e4hlen' : 'Select')}
      </button>
    </div></td>`;
  });
  manuals.forEach((_, mi) => {
    const mKey = `manual:${mi}`;
    const isSel = state.selections[itemKey] === mKey;
    html += `<td style="background:#FAFAFA;border-top:2px solid #D8E2F0 !important"><div style="padding:10px 12px">
      <button class="ph-select-btn${isSel ? ' selected' : ''}" style="font-size:0.72rem"
        data-item="${ek}" data-pi="${mKey}"
        onclick="selectProposal('${ek}','${mKey}',this)">
        ${isSel ? (currentLang === 'de' ? '\u2713\u00a0Ausgew\u00e4hlt' : '\u2713\u00a0Selected') : (currentLang === 'de' ? 'Ausw\u00e4hlen' : 'Select')}
      </button>
    </div></td>`;
  });
  html += '</tr></tfoot></table></div>';
  return `<div id="matrix-wrap-${ek}">${html}</div>`;
}

// ================================================================
// SELECTION
// ================================================================
function selectProposal(itemKey, value, el) {
  state.selections[itemKey] = (state.selections[itemKey] === value) ? null : value;
  const sel = state.selections[itemKey];
  const itemCard = el.closest('.item-card');
  if (!itemCard) { updateExportSummary(); return; }

  // Update proposal column headers (use data-col for both numeric and manual:N keys)
  itemCard.querySelectorAll('.col-proposal-th').forEach(th => {
    const colVal = th.dataset.col;
    const matched = typeof sel === 'number' ? sel === parseInt(colVal) : sel === colVal;
    th.classList.toggle('is-selected', matched);
  });

  // Highlight full column body cells
  itemCard.querySelectorAll('[data-col]').forEach(el => {
    const colVal = el.dataset.col;
    const matched = typeof sel === 'number' ? sel === parseInt(colVal) : sel === colVal;
    el.classList.toggle('col-selected', matched);
  });

  // Update Zubehör panel
  const zubehoerPanel = document.getElementById('zubehoer-' + itemKey);
  if (zubehoerPanel) {
    const itm = (state.results?.items || []).find(i => (i.positionsnummer || i.item_id) === itemKey);
    if (itm) zubehoerPanel.innerHTML = renderZubehoerContent(itemKey, itm.proposals || [], sel);
  }

  // Update all select buttons (header + footer) — data-pi can be numeric or 'manual:N'
  itemCard.querySelectorAll('.ph-select-btn').forEach(btn => {
    const piRaw = btn.dataset.pi;
    const pi = piRaw !== undefined ? (/^\d+$/.test(piRaw) ? parseInt(piRaw) : piRaw) : -1;
    const isSel = sel === pi;
    btn.classList.toggle('selected', isSel);
    btn.textContent = isSel
      ? (currentLang === 'de' ? '\u2713\u00a0Ausgew\u00e4hlt' : '\u2713\u00a0Selected')
      : (currentLang === 'de' ? 'Ausw\u00e4hlen' : 'Select');
  });

  // Update select-none button
  itemCard.querySelectorAll('.snone-btn').forEach(btn => {
    const isSel = sel === 'none';
    btn.classList.toggle('selected', isSel);
    btn.textContent = (isSel ? '\u2713\u00a0' : '') + t('results.select_none');
  });

  // Update selection badge in header
  const selBadge = document.getElementById('selbadge-' + itemKey);
  if (selBadge) {
    if (sel === null || sel === undefined) {
      selBadge.className = 'badge badge-missing item-sel-badge';
      selBadge.textContent = t('export.not_selected');
    } else if (sel === 'none') {
      selBadge.className = 'badge item-sel-badge';
      selBadge.style.cssText = 'background:#FEF2F2;color:#991B1B;border:1px solid #FECACA';
      selBadge.textContent = t('export.none');
    } else {
      const proposals = (state.results?.items || []).find(i => (i.positionsnummer || i.item_id) === itemKey)?.proposals || [];
      const p = proposals[sel];
      selBadge.className = 'badge badge-extracted item-sel-badge';
      selBadge.textContent = '\u2713 ' + (p?.display_article || p?.base_article || '#' + (sel + 1));
    }
  }

  // Update progress bar
  updateProgressBar();

  updateExportSummary();
}

// MANUAL PRODUCT ADD

function rerenderMatrix(itemKey) {
  const ek = escapeHtml(itemKey);
  const wrapper = document.getElementById('matrix-wrap-' + ek);
  if (!wrapper) return;
  const item = (state.results?.items || []).find(i => (i.positionsnummer || i.item_id) === itemKey);
  if (!item) return;
  wrapper.outerHTML = renderComparisonMatrix(item.proposals || [], item.query_fields || [], itemKey);
}

function _popoverOutsideClick(e) {
  if (!e.target.closest('#add-product-popover') && !e.target.closest('.add-product-btn')) {
    closeAddProductPopover();
  }
}
function _popoverKeydown(e) {
  if (e.key === 'Escape') closeAddProductPopover();
}

function closeAddProductPopover() {
  const p = document.getElementById('add-product-popover');
  if (p) p.remove();
  document.removeEventListener('click', _popoverOutsideClick);
  document.removeEventListener('keydown', _popoverKeydown);
}

function openAddProductPopover(itemKey, btn) {
  closeAddProductPopover();
  loadCatalog();
  const pop = document.createElement('div');
  pop.id = 'add-product-popover';
  pop.className = 'add-product-popover';
  pop.innerHTML = `
    <input id="catalog-search-input" class="catalog-search-input" placeholder="${currentLang === 'de' ? 'Artikelnummer\u2026' : 'Article number\u2026'}" autocomplete="off">
    <ul id="catalog-result-list" class="catalog-result-list"></ul>`;
  document.body.appendChild(pop);
  const rect = btn.getBoundingClientRect();
  pop.style.position = 'absolute';
  pop.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  pop.style.left = Math.max(8, rect.left + window.scrollX - 200) + 'px';
  const input = pop.querySelector('#catalog-search-input');
  const list = pop.querySelector('#catalog-result-list');
  input.focus();
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    const hits = q.length < 1 ? [] :
      (state.catalog?.published || []).filter(r => r['Artikelnummer'].toLowerCase().includes(q)).slice(0, 10);
    if (hits.length) {
      list.innerHTML = hits.map(r =>
        `<li class="catalog-result-item" data-artnr="${escapeHtml(r['Artikelnummer'])}">${escapeHtml(r['Artikelnummer'])}</li>`
      ).join('');
    } else if (q.length > 0) {
      list.innerHTML = `<li class="catalog-result-empty">${currentLang === 'de' ? 'Keine Treffer' : 'No results'}</li>`;
    } else {
      list.innerHTML = '';
    }
  });
  list.addEventListener('click', e => {
    const item = e.target.closest('.catalog-result-item');
    if (!item) return;
    addManualProduct(itemKey, item.dataset.artnr);
  });
  // Keydown (Escape) can be registered immediately — it won't catch the opening click
  document.addEventListener('keydown', _popoverKeydown);
  // Outside-click listener deferred so it doesn't catch the button click that opened the popover
  setTimeout(() => {
    document.addEventListener('click', _popoverOutsideClick);
  }, 10);
}

function addManualProduct(itemKey, artNr) {
  const row = state.catalog?.byArticle[artNr];
  if (!row) return;
  state.manualProducts[itemKey] = state.manualProducts[itemKey] || [];
  if (state.manualProducts[itemKey].some(r => r['Artikelnummer'] === artNr)) {
    closeAddProductPopover();
    return;
  }
  // Store a shallow clone so per-position comparison caches don't leak across positions
  state.manualProducts[itemKey].push(Object.assign({}, row));
  closeAddProductPopover();
  rerenderMatrix(itemKey);
}

// Build a synthetic comparison array for a manual product row so the matrix
// rendering pipeline can display real field values (matches the shape of
// API proposal.comparison entries).
function buildManualComparison(catalogRow, queryFields) {
  const qfMap = new Map((queryFields || []).map(qf => [qf.field, qf]));
  return _CATALOG_FIELDS.map(field => {
    const candidateVal = catalogRow[field] != null ? catalogRow[field] : null;
    const qf = qfMap.get(field);
    const queryVal = qf && qf.value != null ? qf.value : null;
    let status;
    if (candidateVal == null && queryVal == null) status = 'missing';
    else if (candidateVal == null) status = 'missing_candidate';
    else if (queryVal == null) status = 'missing_query';
    else {
      const a = String(candidateVal).trim().toLowerCase();
      const b = String(queryVal).trim().toLowerCase();
      status = a === b ? 'match' : 'different';
    }
    return {
      field,
      label: field,
      candidate_value: candidateVal,
      query_value: queryVal,
      status,
    };
  });
}

function updateExportSummary() {
  if (!state.results) return;
  const items = state.results.items || [];
  let selected = 0;
  let rowsHtml = '';
  items.forEach(item => {
    const key = item.positionsnummer || item.item_id;
    const sel = state.selections[key];
    const proposals = item.proposals || [];
    let selText, selArticle = '';
    if (sel === null || sel === undefined) { selText = `<span class="text-muted">${t('export.not_selected')}</span>`; }
    else if (sel === 'none') { selText = `<span style="color:#DC2626">${t('export.none')}</span>`; selected++; }
    else if (typeof sel === 'string' && sel.startsWith('manual:')) {
      const mi = parseInt(sel.split(':')[1]);
      const manuals = state.manualProducts[key] || [];
      selText = `<span class="ph-manual-badge">${currentLang === 'de' ? 'Manuell' : 'Manual'}</span>`;
      selArticle = manuals[mi]?.['Artikelnummer'] || '?';
      selected++;
    }
    else { const p = proposals[sel]; selText = `${t('export.proposal')} #${p?.rank || sel + 1}`; selArticle = p?.display_article || p?.base_article || '?'; selected++; }
    rowsHtml += `<div class="export-row"><span class="export-oz">${escapeHtml(key)}</span><span class="export-selection">${selText}</span><span class="export-article">${escapeHtml(selArticle)}</span></div>`;
  });
  $('selection-count').textContent = `${selected} / ${items.length} ${t('export.selected')}`;
  $('export-summary').innerHTML = `<div class="export-summary-header"><span class="card-title">${t('export.summary')}</span></div><div class="export-summary-body">${rowsHtml}</div>`;
}

function downloadExport(format) {
  if (!state.results) return;
  const items = state.results.items || [];
  const meta = state.results._meta || {};
  const rows = [];
  items.forEach(item => {
    const key = item.positionsnummer || item.item_id;
    const sel = state.selections[key];
    const proposals = item.proposals || [];
    const accSet = state.accessorySelections[key];
    const isManual = typeof sel === 'string' && sel.startsWith('manual:');
    const row = {
      positionsnummer: key, item_id: item.item_id || '', run_id: meta.run_id || '',
      decision: sel === null || sel === undefined ? '' : sel === 'none' ? 'NONE' : 'SELECTED',
      selected_rank: typeof sel === 'number' ? (proposals[sel]?.rank || sel + 1) : '',
      selected_article: '', selected_score: '',
      selected_accessories: accSet && accSet.size > 0 ? Array.from(accSet).join('|') : '',
    };
    if (typeof sel === 'number' && proposals[sel]) {
      row.selected_article = proposals[sel].display_article || proposals[sel].base_article || '';
      row.selected_score = proposals[sel].score ?? '';
    } else if (isManual) {
      const mi = parseInt(sel.split(':')[1]);
      const manuals = state.manualProducts[key] || [];
      if (manuals[mi]) row.selected_article = manuals[mi]['Artikelnummer'];
    }
    rows.push(row);
  });

  const headers = Object.keys(rows[0] || {});
  const content = [headers.join(';'), ...rows.map(r => headers.map(h => String(r[h] ?? '')).join(';'))].join('\n');
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rp-matcher-export-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function downloadAbas() {
  if (!state.results) return;
  loadCatalog();
  const items = state.results.items || [];
  const lines = ['OZ;ABAS-ID;'];
  items.forEach(item => {
    const key = item.positionsnummer || item.item_id;
    const sel = state.selections[key];
    if (sel === null || sel === undefined || sel === 'none') return;
    const oz = key;
    let abasId = '';
    if (typeof sel === 'number') {
      const proposals = item.proposals || [];
      const p = proposals[sel];
      abasId = p?.abas_id || '';
      if (!abasId) {
        const article = p?.display_article || p?.base_article;
        if (article && state.catalog?.byArticle[article]) {
          abasId = state.catalog.byArticle[article]['ABAS-ID'] || '';
        }
      }
    } else if (typeof sel === 'string' && sel.startsWith('manual:')) {
      const mi = parseInt(sel.split(':')[1]);
      abasId = (state.manualProducts[key] || [])[mi]?.['ABAS-ID'] || '';
    }
    lines.push(`${oz};${abasId};`);
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const fileId = state.activeProcessId || state.results?._meta?.run_id || new Date().toISOString().slice(0, 10);
  a.download = `abas-${fileId}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 100);
}

function _copyToClipboard(text, btnId) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    if (btn) { btn.classList.add('copied'); btn.textContent = '\u2713 Copied'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500); }
  });
}
function _downloadText(text, filename) {
  const ext = filename.endsWith('.json') ? 'application/json' : 'text/plain';
  const blob = new Blob([text], { type: ext + ';charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 100);
}

function renderIntermediatePanel() {
  const pr = state.pipelineResponse;
  const container = $('intermediate-container');
  if (!container) return;

  const allTasks = (pr && pr.outputs) ? pr.outputs : [];
  if (allTasks.length === 0 && !state.results) return;

  // Split: intermediate = all but last, lambda = last task
  const intermediate = allTasks.length > 1 ? allTasks.slice(0, -1) : [];
  const lambdaTask = allTasks.length > 0 ? allTasks[allTasks.length - 1] : null;

  const totalCount = intermediate.length + (lambdaTask ? 1 : 0) + (state.results ? 1 : 0);
  let html = `<button class="intermediate-toggle" onclick="document.getElementById('intermediate-body').classList.toggle('open')">\u25B8 ${t('intermediate.show')} (${totalCount})</button>`;
  html += '<div class="intermediate-body" id="intermediate-body">';

  // Render intermediate pipeline tasks
  intermediate.forEach((task, i) => {
    const name = task.taskName || task.identifier || ('Task ' + (i + 1));
    const text = task.outputText || '';
    let display = text;
    try { display = JSON.stringify(JSON.parse(text), null, 2); } catch(e) {}
    const btnId = 'imcp-' + i;
    html += `<div class="intermediate-task">
      <div class="intermediate-task-header">
        <div class="intermediate-task-name">${escapeHtml(name)}</div>
        <div class="intermediate-actions">
          <button id="${btnId}" onclick="_copyToClipboard(document.getElementById('impre-${i}').textContent, '${btnId}')">Copy</button>
          <button onclick="_downloadText(document.getElementById('impre-${i}').textContent, '${escapeHtml(name).replace(/\s+/g, '_')}.json')">Download</button>
        </div>
      </div>
      <pre class="intermediate-task-body" id="impre-${i}">${escapeHtml(display)}</pre>
    </div>`;
  });

  // Lambda output (last task from pipeline)
  if (lambdaTask) {
    const lambdaText = lambdaTask.outputText || '';
    let lambdaDisplay = lambdaText;
    try { lambdaDisplay = JSON.stringify(JSON.parse(lambdaText), null, 2); } catch(e) {}
    const lambdaName = lambdaTask.taskName || lambdaTask.identifier || 'Lambda Output';
    html += `<div class="intermediate-task">
      <div class="intermediate-task-header">
        <div class="intermediate-task-name" style="color:#15803D">\u2713 ${escapeHtml(lambdaName)} (${currentLang === 'de' ? 'Endausgabe' : 'Final Output'})</div>
        <div class="intermediate-actions">
          <button id="imcp-lambda" onclick="_copyToClipboard(document.getElementById('impre-lambda').textContent, 'imcp-lambda')">Copy</button>
          <button onclick="_downloadText(document.getElementById('impre-lambda').textContent, 'lambda_output.json')">Download</button>
        </div>
      </div>
      <pre class="intermediate-task-body" id="impre-lambda">${escapeHtml(lambdaDisplay)}</pre>
    </div>`;
  }

  // Final parsed WP5 JSON (the data we display in the UI)
  if (state.results) {
    const resultsJson = JSON.stringify(state.results, null, 2);
    html += `<div class="intermediate-task">
      <div class="intermediate-task-header">
        <div class="intermediate-task-name" style="color:#1032CF">WP5 ${currentLang === 'de' ? 'Ergebnis-JSON' : 'Result JSON'}</div>
        <div class="intermediate-actions">
          <button id="imcp-wp5" onclick="_copyToClipboard(document.getElementById('impre-wp5').textContent, 'imcp-wp5')">Copy</button>
          <button onclick="_downloadText(document.getElementById('impre-wp5').textContent, 'wp5_result.json')">Download</button>
        </div>
      </div>
      <pre class="intermediate-task-body" id="impre-wp5">${escapeHtml(resultsJson)}</pre>
    </div>`;
  }

  html += '</div>';
  container.innerHTML = html;
  container.style.display = 'block';
}

function toggleRawJson() { $('raw-json-output').classList.toggle('hidden'); }

async function restoreFromRoute({ revalidate = true, replaceHistory = true } = {}) {
  const { processId, step } = getRouteState();
  const cached = processId ? loadProcessCache(processId) : null;

  suppressRouteSync = true;
  try {
    if (processId) {
      setMode('resume', { updateHistory: false });
      setActiveProcessId(processId);

      if (cached?.results) {
        if (step === 'processing') {
          hydrateCachedProcess(cached, { render: false });
          renderProcessingSnapshot(processId, cached.pipelineResponse, { liveState: 'cached' });
          goToStep('processing', { updateHistory: false, replaceHistory });
        } else {
          hydrateCachedProcess(cached);
          goToStep(step === 'export' ? 'export' : 'results', { updateHistory: false, replaceHistory });
        }
      } else {
        state.processing.liveState = 'idle';
        updateProcessRibbon('idle');
        if (!state.apiKey) setResumeStatus(t('processing.resume_waiting_key'), 'success');
        goToStep('config', { updateHistory: false, replaceHistory });
      }
    } else {
      if (!state.results) {
        setActiveProcessId('');
        state.processing.liveState = 'idle';
        setResumeStatus('');
        setMode(state.mode === 'json' ? 'json' : 'api', { updateHistory: false });
        goToStep('config', { updateHistory: false, replaceHistory });
      } else {
        goToStep(step === 'export' ? 'export' : step === 'config' ? 'config' : 'results', { updateHistory: false, replaceHistory });
      }
    }
  } finally {
    suppressRouteSync = false;
  }

  if (revalidate && processId && state.apiKey) {
    startResumeFromInput({ processId, targetStep: step, syncHistory: false }).catch(() => {});
  }
}
