      line-height: 1.35;
    }
    .ph-issues-summary::-webkit-details-marker { display: none; }
    .ph-issues-caret {
      font-size: 0.72rem;
      color: #B45309;
      transition: transform 0.16s ease;
      flex-shrink: 0;
    }
    .ph-issues-panel[open] .ph-issues-caret { transform: rotate(90deg); }
    .ph-issues-count {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(180, 83, 9, 0.1);
      color: #92400E;
      flex-shrink: 0;
    }
    .ph-issues-label {
      min-width: 0;
      flex: 1;
    }
    .ph-issues-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 8px 8px;
      margin: 0;
      list-style: none;
      border-top: 1px solid #FDE68A;
    }
    .ph-issues-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      font-size: 0.66rem;
      color: #7C2D12;
      line-height: 1.4;
    }
    .ph-issues-item:first-child { padding-top: 7px; }
    .ph-issues-tag {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 5px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .ph-issues-tag.different { background: #FEF3C7; color: #92400E; }
    .ph-issues-tag.upgrade { background: #DBEAFE; color: #1E40AF; }
    .ph-issues-tag.missing_candidate,
    .ph-issues-tag.missing_query,
    .ph-issues-tag.missing { background: #F3F4F6; color: #6B7280; }
    .ph-issues-text strong {
      display: block;
      font-weight: 700;
      color: #92400E;
      margin-bottom: 1px;
    }
    .ph-overview-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .ph-select-btn {
      margin-top: 4px;
      width: 100%;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1.5px solid #D8E2F0;
      background: #FFFFFF;
      color: #4A6080;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.01em;
    }
    .ph-select-btn.compact {
      width: auto;
      margin-top: 0;
      padding: 5px 10px;
      font-size: 0.72rem;
      flex: 0 0 auto;
    }
    .ph-select-btn.top-cta {
      width: 100%;
      margin-top: 0;
      padding: 8px 12px;
      font-size: 0.74rem;
      border-color: #B8CAF0;
      background: linear-gradient(180deg, #F7FAFF 0%, #EEF4FF 100%);
      color: #1032CF;
      box-shadow: 0 1px 0 rgba(16,50,207,0.08), inset 0 0 0 1px rgba(255,255,255,0.55);
    }
    .ph-select-btn:hover { border-color: #1032CF; color: #1032CF; background: #EBF0FF; }
    .ph-select-btn.selected { border-color: #1032CF; background: #1032CF; color: #FFFFFF; }

    /* Group header row */
    .group-row td {
      background: #F1F5FB;
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 0.63rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #1032CF;
      border-top: 2px solid #D8E2F0 !important;
    }
    .group-row .group-label-cell {
      position: sticky !important;
      left: 0;
      z-index: 6;
      width: calc(var(--matrix-col-fname) + var(--matrix-col-query));
      min-width: calc(var(--matrix-col-fname) + var(--matrix-col-query));
      border-right: 2px solid #D8E2F0 !important;
      box-shadow: 1px 0 0 #D8E2F0;
    }
    .group-row .group-label-fill {
      position: static !important;
      padding: 0;
    }

    /* Status cells */
    .cell-match    { background: #F0FDF4; }
    .cell-diff     { background: #FFFBEB; }
    .cell-upgrade  { background: #EFF6FF; }
    .cell-missing  { background: #F9FAFB; }
    .cell-nodata   { background: #FAFAFA; }

    .cell-inner {
      padding: 7px 12px;
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      align-items: flex-start;
      gap: 5px;
      width: 100%;
    }
    .cell-icon {
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }
    .cell-match .cell-icon    { color: #15803D; }
    .cell-diff .cell-icon     { color: #B45309; }
    .cell-upgrade .cell-icon  { color: #1D4ED8; }
    .cell-missing .cell-icon  { color: #9CA3AF; }

    .cell-val {
      display: block;
      min-width: 0;
      max-width: 100%;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: #1A2B40;
      line-height: 1.3;
      word-break: normal;
      overflow-wrap: break-word;
      hyphens: none;
      white-space: normal;
    }
    .cell-missing .cell-val   { color: #9CA3AF; font-style: italic; }
    .cell-diff .cell-val      { color: #92400E; }
    .cell-upgrade .cell-val   { color: #1D4ED8; font-weight: 600; }
    .cell-match .cell-val     { color: #15803D; }

    /* Select-none row */
    .snone-row td {
      border-top: 2px solid #D8E2F0 !important;
      padding: 10px 12px;
      background: #FAFAFA;
    }
    .snone-btn {
      padding: 6px 14px;
      border: 1.5px dashed #C8D8EE;
      border-radius: 6px;
      background: none;
      color: #8BA0B8;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .snone-btn:hover { border-color: #EF4444; color: #EF4444; background: #FEF2F2; }
    .snone-btn.selected { border-color: #EF4444; border-style: solid; color: #EF4444; background: #FEF2F2; }

    /* Sticky header top */
    .matrix-table thead th { position: sticky; top: 0; z-index: 3; }
    .col-fname, .col-query { top: 0; z-index: 4; }

    /* Col-header sticky override */
    .matrix-table thead .col-fname { top: 0; z-index: 5; }
    .matrix-table thead .col-query { top: 0; z-index: 5; }

    .thead-field-label {
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8BA0B8;
      background: #F1F5FB;
      border-right: 2px solid #D8E2F0 !important;
    }
    .thead-query-label {
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8BA0B8;
      background: #F8FAFD;
      border-right: 2px solid #D8E2F0 !important;
    }

    .no-proposals-msg {
      padding: 40px 24px;
      text-align: center;
      color: #8BA0B8;
      font-size: 0.9rem;
    }

    /* Topk pill on light bg */
    .topk-pill { background: #EBF0FF; color: #1032CF; border-color: rgba(16,50,207,0.2); }

    /* Badge overrides for light bg */
    .badge-extracted { background: #DCFCE7; color: #15803D; border-color: #86EFAC; }
    .badge-derived   { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }
    .badge-missing   { background: #F3F4F6; color: #6B7280; border-color: #D1D5DB; }
    .badge-rp        { background: #EBF0FF; color: #1032CF; border-color: rgba(16,50,207,0.2); }

    /* Ensure item-card-body doesn't have old padding/grid */
    .item-card-body { padding: 0 !important; }

    /* ================================================================
       P93 COLLAPSIBLE PANEL — below Zubehör
       ================================================================ */
    .p93-panel {
      padding: 8px 20px;
      border-top: 1px solid #E0E8F4;
      background: #FAFBFD;
    }
    .p93-toggle {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: #4A6080;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .p93-toggle:hover { color: #1032CF; }
    .p93-body {
      display: none;
      padding: 8px 0;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #1A2B40;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      font-family: var(--font-mono);
    }
    .p93-body.open { display: block; }

    /* ================================================================
       ANFRAGE PANEL
       ================================================================ */
    .anfrage-panel {
      border-top: 1px solid #E0E8F4;
      background: #FAFBFD;
    }
    .anfrage-toggle {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: #4A6080;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: 100%;
      text-align: left;
    }
    .anfrage-toggle:hover { color: #1032CF; }
    .anfrage-body { display: none; padding: 0 20px 12px; }
    .anfrage-body.open { display: block; }

    .anfrage-confidence { font-size: 0.72rem; font-family: var(--font-mono); margin-bottom: 8px; }
    .anfrage-confidence.high { color: #15803D; }
    .anfrage-confidence.mid  { color: #D97706; }
    .anfrage-confidence.low  { color: #DC2626; }

    .anfrage-constraints { margin-bottom: 8px; font-size: 0.72rem; }
    .anfrage-constraint-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px; margin-bottom: 3px; }
    .anfrage-constraint-label { font-family: var(--font-mono); color: #4A6080; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; min-width: 120px; }
    .constraint-badge {
      display: inline-block;
      font-size: 0.65rem; font-weight: 700; font-family: var(--font-mono);
      padding: 2px 7px; border-radius: 999px;
      white-space: nowrap;
    }
    .constraint-badge-hard { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
    .constraint-badge-soft { background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1; }

    .anfrage-evidence { font-size: 0.72rem; color: #1E40AF; font-family: var(--font-mono); margin-bottom: 8px; }
    .anfrage-evidence-label { font-size: 0.65rem; color: #4A6080; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }

    .anfrage-source-text { margin-bottom: 10px; }
    .anfrage-section-label { font-size: 0.65rem; font-weight: 600; color: #4A6080; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; display: block; }
    .anfrage-text-details summary { cursor: pointer; font-size: 0.72rem; color: #4A6080; font-style: italic; list-style: none; padding: 2px 0; }
    .anfrage-text-details summary::before { content: '\25B8\00A0'; font-style: normal; }
    .anfrage-text-details[open] summary::before { content: '\25BE\00A0'; }
    .anfrage-text-pre { background: #F4F7FC; border-left: 3px solid #93C5FD; padding: 8px 10px; margin: 4px 0 0 0; font-size: 0.72rem; line-height: 1.55; white-space: pre-wrap; color: #1A2B40; border-radius: 0 4px 4px 0; font-family: var(--font-mono); }
    .anfrage-warn-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 8px; }
    .anfrage-warn-badge { font-size: 0.65rem; background: #FFF8E1; color: #7A5800; border: 1px solid #F0C040; border-radius: 3px; padding: 2px 7px; font-family: var(--font-mono); }

    .anfrage-field-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 6px; }
    .anfrage-field-table .afr-group td { background: #F4F7FC; font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700; color: #4A6080; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 6px; border-bottom: 1px solid #E0E8F4; }
    .anfrage-field-table td { padding: 3px 6px; border-bottom: 1px solid #EEF2F8; vertical-align: middle; }
    .anfrage-field-table .afr-fname { font-family: var(--font-mono); color: #4A6080; width: 40%; }
    .anfrage-field-table .afr-fval  { color: #1A2B40; font-weight: 500; }
    .anfrage-field-table .afr-fval.missing { color: #9CA3AF; font-style: italic; }
    .afr-badge { font-size: 0.58rem; padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono); font-weight: 600; text-transform: uppercase; margin-left: 4px; }
    .afr-badge.extracted { background: #DCFCE7; color: #15803D; }
    .afr-badge.derived   { background: #DBEAFE; color: #1E40AF; }

    /* ================================================================
       FEEDBACK BUTTON
       ================================================================ */
    .feedback-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 11px;
      border-radius: 6px;
      border: 1px solid #D8E2F0;
      background: #FFFFFF;
      color: #4A6080;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .feedback-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #FFF5F0;
      color: #DC4A1A;
      font-size: 0.95rem;
      line-height: 1;
      box-shadow: inset 0 0 0 1px rgba(220, 74, 26, 0.12);
      flex-shrink: 0;
    }
    .feedback-label { font-weight: 700; letter-spacing: 0.02em; }
    .feedback-btn:hover { border-color: #DC4A1A; color: #DC4A1A; background: #FFF5F0; }
    .feedback-btn:hover .feedback-icon {
      background: #DC4A1A;
      color: #FFFFFF;
    }

    /* ================================================================
       FULL COLUMN HIGHLIGHT
       ================================================================ */
    td.col-selected { background: #EBF3FF !important; }

    /* ================================================================
       ZUBEHÖR PANEL
       ================================================================ */
    .zubehoer-panel {
      padding: 14px 20px;
      border-top: 1px solid #E0E8F4;
      background: #FAFBFD;
    }
    .zubehoer-header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    .zubehoer-title {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #1032CF;
    }
    .zubehoer-subtitle { font-size: 0.75rem; color: #8BA0B8; }
    .zubehoer-cat-block { margin-bottom: 10px; }
    .zubehoer-cat-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #3D5170;
      margin-bottom: 5px;
    }
    .zubehoer-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }
    .zubehoer-chip {
      display: grid;
      grid-template-columns: 12px auto minmax(0, 1fr) auto;
      align-items: start;
      gap: 4px 8px;
      padding: 7px 10px;
      border: 1.5px solid #D8E2F0;
      border-radius: 8px;
      background: #FFFFFF;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      max-width: 100%;
    }
    .zubehoer-chip:hover { border-color: #1032CF; background: #EBF0FF; }
    .zubehoer-chip.zc-selected { border-color: #1032CF; background: #EBF0FF; }
    .zc-check {
      grid-column: 1;
      grid-row: 1 / span 2;
      font-size: 0.7rem;
      color: #1032CF;
      width: 12px;
      text-align: center;
      line-height: 1.5;
      padding-top: 1px;
    }
    .zc-keyline {
      grid-column: 2 / 4;
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }
    .zc-key { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; color: #1A2B40; white-space: nowrap; }
    .zc-desc {
      grid-column: 2 / 4;
      font-size: 0.72rem;
      color: #4A6080;
      line-height: 1.35;
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .zc-fa {
      grid-column: 4;
      grid-row: 1 / span 2;
      align-self: center;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: #8BA0B8;
      background: #F4F7FC;
      padding: 2px 6px;
      border-radius: 999px;
      white-space: nowrap;
      margin-left: 2px;
    }
    .zubehoer-empty { font-size: 0.8rem; color: #8BA0B8; padding: 2px 0; }
    .zubehoer-cat-mandatory {
      background: rgba(239, 68, 68, 0.04);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .zubehoer-cat-mandatory .zubehoer-cat-label { color: #C53030; }
    .zubehoer-chip.zc-paired {
      border-color: #22C55E;
      background: rgba(34, 197, 94, 0.06);
    }
    .zubehoer-chip.zc-paired:hover { border-color: #16A34A; background: rgba(34, 197, 94, 0.12); }
    .zubehoer-chip.zc-paired.zc-selected { border-color: #1032CF; background: #EBF0FF; }
    .zc-paired-badge {
      font-size: 0.6rem;
      color: #22C55E;
    }
    .zc-wrapper {
      display: flex;
      flex-direction: column;
      flex: 0 1 auto;
      max-width: 100%;
      min-width: 0;
    }
    .zc-wrapper-selected {
      flex: 1 1 320px;
      min-width: min(100%, 260px);
    }
    .zc-detail {
      background: #F4F7FC;
      border: 1px solid #D8E2F0;
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 8px 10px;
      margin-top: -1px;
      font-size: 0.68rem;
    }
    .zc-detail-row {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      padding: 2px 0;
    }
    .zc-detail-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: #8BA0B8;
      min-width: 80px;
      flex-shrink: 0;
    }
    .zc-detail-val {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: #1A2B40;
      font-weight: 600;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 640px) {
      .zubehoer-chip {
        width: 100%;
        grid-template-columns: 12px minmax(0, 1fr);
      }
      .zc-keyline,
      .zc-desc {
        grid-column: 2;
      }
      .zc-fa {
        grid-column: 2;
        grid-row: auto;
        justify-self: start;
        align-self: start;
        margin-left: 0;
      }
      .zc-wrapper,
      .zc-wrapper-selected {
        flex-basis: 100%;
        min-width: 100%;
      }
    }

    /* ================================================================
       RESULTS TOOLBAR — progress, search, expand/collapse
       ================================================================ */
    .results-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 12px 20px;
      background: #FFFFFF;
      border: 1px solid #D8E2F0;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(30,50,90,0.06);
    }
    .toolbar-left { display: flex; align-items: center; gap: 12px; flex: 1 1 320px; min-width: 0; }
    .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; flex: 1 1 320px; }
    .progress-wrap { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 320px; }
    .progress-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 700;
      color: #1032CF;
      white-space: nowrap;
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: #E8EDF5;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #1032CF, #22C55E);
      transition: width 0.4s ease;
    }
    .item-search {
      padding: 6px 12px;
      border: 1px solid #D8E2F0;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: #1A2B40;
      background: #F8FAFD;
      width: clamp(180px, 22vw, 280px);
      max-width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .item-search:focus { border-color: #1032CF; box-shadow: 0 0 0 2px rgba(16,50,207,0.1); }
    .item-search::placeholder { color: #8BA0B8; }
    .toolbar-btn {
      padding: 5px 10px;
      border: 1px solid #D8E2F0;
      border-radius: var(--radius-sm);
      background: #FFFFFF;
      color: #4A6080;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .toolbar-btn:hover { border-color: #1032CF; color: #1032CF; background: #EBF0FF; }

    @media (max-width: 980px) {
      .header {
        flex-wrap: wrap;
        gap: 12px;
      }
      .header-brand {
        min-width: 0;
        flex: 1 1 320px;
      }
      .header-title-block {
        min-width: 0;
      }
      .header-right {
        width: 100%;
        justify-content: space-between;
      }
      .results-toolbar {
        padding: 12px 14px;
      }
      .toolbar-left,
      .toolbar-right {
        width: 100%;
      }
      .toolbar-left {
        flex-wrap: wrap;
      }
      .toolbar-right {
        justify-content: flex-start;
      }
      .item-card-badges {
        order: 3;
        width: 100%;
        margin-left: 52px;
      }
      .feedback-btn {
        margin-left: 52px;
      }
    }

    @media (max-width: 640px) {
      .header-divider {
        display: none;
      }
      .header-right {
        flex-wrap: wrap;
        gap: 10px;
      }
      .step-nav {
        padding-left: var(--app-gutter);
        padding-right: var(--app-gutter);
      }

      .item-card-header {
        padding: 16px;
      }
      .item-card-badges,
      .feedback-btn {
        margin-left: 0;
      }
      .toolbar-btn {
        flex: 1 1 140px;
        text-align: center;
      }
      .resume-actions {
        justify-content: stretch;
      }
      .resume-actions .btn {
        width: 100%;
      }
      .process-ribbon {
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
      }
      .process-share-btn {
        width: auto;
        margin-left: 0;
        padding-left: 0;
      }
    }

    /* Selection badge in item header */
    .item-sel-badge { font-size: 0.6rem !important; }

    /* Extralogic logs panel */
    .extralogic-panel {
      padding: 6px 20px;
      background: #F8FAFD;
      border-bottom: 1px solid #E0E8F4;
    }
    .extralogic-toggle {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: #4A6080;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .extralogic-toggle:hover { color: #1032CF; }
    .extralogic-list {
      display: none;
      padding: 6px 0 4px;
    }
    .extralogic-list.open { display: block; }
    .extralogic-entry {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: #3D5170;
      padding: 2px 0;
      line-height: 1.4;
      border-left: 2px solid #DBEAFE;
      padding-left: 8px;
      margin-bottom: 3px;
    }

    /* Reason codes in proposal header */
    .ph-reasons {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-top: 2px;
    }
    .reason-tag {
      font-family: var(--font-mono);
      font-size: 0.54rem;
      padding: 1px 4px;
      border-radius: 3px;
      background: #F4F7FC;
      color: #4A6080;
      white-space: nowrap;
    }
    .reason-tag.rc-match { background: #DCFCE7; color: #15803D; }
    .reason-tag.rc-upgrade { background: #DBEAFE; color: #1E40AF; }

    /* Comparison notes stay in the title tooltip to keep narrow cells readable */
    .cell-note {
      font-size: 0.6rem;
      color: #8BA0B8;
      font-style: italic;
      display: none;
      margin-top: 1px;
      line-height: 1.2;
    }

    /* Product features mini-card */
    .ph-features {
      display: none;
      margin-top: 4px;
      padding: 4px 6px;
      background: #F8FAFD;
      border: 1px solid #E8EDF5;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: #4A6080;
      max-height: 80px;
      overflow-y: auto;
    }
    .ph-features.open { display: block; }
    .ph-feat-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; padding: 1px 0; }
    .ph-feat-key { color: #8BA0B8; min-width: 0; overflow-wrap: anywhere; }
    .ph-feat-val { color: #1A2B40; font-weight: 600; text-align: right; min-width: 0; overflow-wrap: anywhere; }
    .ph-feat-toggle {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: #8BA0B8;
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 0;
      transition: color 0.15s;
    }
    .ph-feat-toggle.compact {
      padding: 5px 8px;
      border: 1px solid #D8E2F0;
      border-radius: 999px;
      background: #FFFFFF;
      color: #4A6080;
      flex: 0 0 auto;
    }
    .ph-feat-toggle:hover { color: #1032CF; }
    .ph-feat-toggle.compact:hover { border-color: #1032CF; background: #EBF0FF; }

    /* Intermediate task outputs panel */
    .intermediate-panel {
      padding: 10px 20px;
      background: #F8FAFD;
      border-top: 1px solid #E0E8F4;
      border-bottom: 1px solid #E0E8F4;
    }
    .intermediate-toggle {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: #4A6080;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
    }
    .intermediate-toggle:hover { color: #1032CF; }
    .intermediate-body {
      display: none;
      padding: 8px 0;
    }
    .intermediate-body.open { display: block; }
    .intermediate-task {
      margin-bottom: 8px;
    }
    .intermediate-task-name {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      color: #1032CF;
      margin-bottom: 4px;
    }
    .intermediate-task-body {
      background: #1A2B40;
      color: #A4C8E4;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      max-height: 500px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.4;
    }
    .intermediate-task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .intermediate-actions {
      display: flex;
      gap: 4px;
    }
    .intermediate-actions button {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid #D8E2F0;
      background: #FFFFFF;
      color: #4A6080;
      cursor: pointer;
      transition: all 0.15s;
    }
    .intermediate-actions button:hover { border-color: #1032CF; color: #1032CF; background: #EBF0FF; }
    .intermediate-actions button.copied { border-color: #22C55E; color: #15803D; background: #F0FDF4; }

  </style>
</head>
<body>

<!-- LLM-NAV: HTML APP SHELL.
     The UI flows through config -> processing -> results.
     Export lives inside the results section and is exposed as step 4 in the step nav.
-->
<div class="app">
  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header class="header">
    <div class="header-brand">
      <img src="./assets/rp-group-logo.png"
           id="header-logo"
           onerror="this.onerror=null; this.src=RP_REMOTE_ASSETS.logo;"
           alt="RP Group" class="header-logo"/>
      <div class="header-divider"></div>
      <div class="header-title-block">
        <div class="header-title">Produkt-Matcher</div>
        <div class="header-subtitle" data-i18n="header.subtitle"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-session">
        <span class="dot" id="session-dot"></span>
        <span id="session-label" data-i18n="session.none"></span>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="de" onclick="setLang('de')">DE</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <!-- ============================================================
       STEP NAVIGATION
       ============================================================ -->
  <nav class="step-nav">
    <div class="step-nav-item active" data-step="config">
      <div class="step-nav-circle">01</div>
      <span class="step-nav-label" data-i18n="nav.config"></span>
    </div>
    <div class="step-nav-line" id="line-1-2"></div>
    <div class="step-nav-item" data-step="processing">
      <div class="step-nav-circle">02</div>
      <span class="step-nav-label" data-i18n="nav.processing"></span>
    </div>
    <div class="step-nav-line" id="line-2-3"></div>
    <div class="step-nav-item" data-step="results">
      <div class="step-nav-circle">03</div>
      <span class="step-nav-label" data-i18n="nav.results"></span>
    </div>
    <div class="step-nav-line" id="line-3-4"></div>
    <div class="step-nav-item" data-step="export">
      <div class="step-nav-circle">04</div>
      <span class="step-nav-label" data-i18n="nav.export"></span>
    </div>
  </nav>

  <!-- ============================================================
       STEP 1: CONFIGURATION
       ============================================================ -->
  <section class="section active" id="section-config">

    <div class="mode-toggle">
      <button class="mode-toggle-btn active" data-mode="api" onclick="setMode('api')" data-i18n="mode.api"></button>
      <button class="mode-toggle-btn" data-mode="resume" onclick="setMode('resume')" data-i18n="mode.resume"></button>
      <button class="mode-toggle-btn" data-mode="json" onclick="setMode('json')" data-i18n="mode.json"></button>
    </div>

    <!-- API MODE -->
    <div id="mode-api">
      <div class="config-grid">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="auth.title"></span>
          </div>
          <div class="input-group">
            <label class="label" data-i18n="auth.label"></label>
            <div class="input-wrapper">
              <input type="password" class="input-field" id="api-key-input"
                     data-i18n-placeholder="auth.placeholder"
                     autocomplete="off" spellcheck="false"/>
              <button class="toggle-vis" onclick="toggleKeyVis('api-key-input')" data-i18n-title="auth.toggle">&#9673;</button>
            </div>
            <div class="security-note" data-i18n="auth.security"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="file.title"></span>
          </div>
          <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-controls="file-input" onclick="openFilePicker(event)" onkeydown="handleDropzoneKeydown(event)">
            <div id="dropzone-empty">
              <div class="dropzone-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <div class="dropzone-text" data-i18n="file.drop"></div>
              <div class="dropzone-hint" data-i18n="file.click"></div>
            </div>
            <div id="dropzone-filled" class="hidden">
              <div class="file-info">
                <div class="file-info-icon">P93</div>
                <div>
                  <div class="file-info-name" id="file-name"></div>
                  <div class="file-info-size" id="file-size"></div>
                  <div class="file-info-status" id="file-status"></div>
                </div>
                <button type="button" class="file-info-remove" onclick="event.preventDefault(); event.stopPropagation(); removeFile()" data-i18n-title="file.remove">&#10005;</button>
              </div>
            </div>
            <input type="file" id="file-input" accept=".p93"/>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title" data-i18n="settings.title"></span>
          <span class="label" data-i18n="settings.optional"></span>
        </div>
        <div class="settings-row">
          <div class="input-group">
            <label class="label" data-i18n="settings.topk"></label>
            <select class="input-field" id="setting-topk">
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="10">10</option>
            </select>
            <div class="security-note" data-i18n="settings.topk.hint"></div>
          </div>
          <div class="input-group">
            <label class="label" data-i18n="settings.material"></label>
            <select class="input-field" id="setting-material">
              <option value="all" data-i18n="settings.material.all"></option>
              <option value="kunststoff" data-i18n="settings.material.plastic"></option>
              <option value="metall" data-i18n="settings.material.metal"></option>
            </select>
          </div>
          <div class="input-group">
            <label class="label" data-i18n="settings.virtual"></label>
            <select class="input-field" id="setting-virtual">
              <option value="false" data-i18n="settings.virtual.no"></option>
              <option value="true" data-i18n="settings.virtual.yes"></option>
            </select>
          </div>
          <div class="input-group">
            <label class="label" data-i18n="settings.system"></label>
            <select class="input-field" id="setting-system">
              <option value="auto" data-i18n="settings.system.auto"></option>
              <option value="EB" data-i18n="settings.system.option.eb"></option>
              <option value="ZB" data-i18n="settings.system.option.zb"></option>
              <optgroup id="optgroup-eb" label="Einzelbatterie">
                <option value="SC" data-i18n="settings.system.option.sc"></option>
                <option value="WL" data-i18n="settings.system.option.wl"></option>
                <option value="WB" data-i18n="settings.system.option.wb"></option>
              </optgroup>
              <optgroup id="optgroup-zb" label="Zentralbatterie">
                <option value="ML" data-i18n="settings.system.option.ml"></option>
                <option value="CC" data-i18n="settings.system.option.cc"></option>
                <option value="CPS" data-i18n="settings.system.option.cps"></option>
              </optgroup>
            </select>
            <div class="security-note" data-i18n="settings.system.hint"></div>
          </div>
        </div>
      </div>

      <div class="mt-24 text-center">
        <button class="btn btn-primary" id="btn-start" onclick="startPipeline()" disabled data-i18n="btn.start"></button>
      </div>
    </div>

    <!-- RESUME MODE -->
    <div id="mode-resume" class="hidden">
      <div class="resume-shell">
        <div class="card resume-card">
          <div class="card-header">
            <span class="card-title" data-i18n="resume.title"></span>
            <span class="label" data-i18n="resume.subtitle"></span>
          </div>
          <div class="resume-grid">
            <div class="input-group">
              <label class="label" data-i18n="auth.label"></label>
              <div class="input-wrapper">
                <input type="password" class="input-field" id="api-key-resume-input"
                       data-i18n-placeholder="auth.placeholder"
                       autocomplete="off" spellcheck="false"/>
                <button class="toggle-vis" onclick="toggleKeyVis('api-key-resume-input')" data-i18n-title="auth.toggle">&#9673;</button>
              </div>
              <div class="security-note" data-i18n="auth.security"></div>
            </div>

            <div class="input-group">
              <label class="label" data-i18n="resume.process_label"></label>
              <input type="text" class="input-field process-id-input" id="resume-process-input"
                     data-i18n-placeholder="resume.process_placeholder"
                     autocomplete="off" spellcheck="false"/>
              <div class="security-note" data-i18n="resume.process_hint"></div>
            </div>
          </div>
          <div class="resume-actions">
            <button class="btn btn-primary" id="btn-resume" onclick="startResumeFromInput()" disabled data-i18n="resume.cta"></button>
            <button class="btn btn-ghost" onclick="fillResumeFromRoute()" data-i18n="resume.use_link"></button>
          </div>
          <div class="resume-status hidden" id="resume-status"></div>
        </div>
      </div>
    </div>

    <!-- JSON PASTE MODE -->
    <div id="mode-json" class="hidden">
      <div class="card">
        <div class="card-header">
          <span class="card-title" data-i18n="json.title"></span>
          <span class="label" data-i18n="json.subtitle"></span>
        </div>
        <textarea class="json-area" id="json-paste"
                  placeholder='{"_meta": { ... }, "items": [ ... ]}'
                  spellcheck="false"></textarea>
        <div class="mt-16 text-center">
          <button class="btn btn-primary" id="btn-parse-json" onclick="parseJsonInput()" data-i18n="json.parse"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============================================================
       STEP 2: PROCESSING
       ============================================================ -->
  <section class="section" id="section-processing">
    <div class="process-ribbon hidden" id="processing-process-ribbon">
      <div class="process-ribbon-copy">
        <div class="process-ribbon-kicker" data-i18n="process.ribbon"></div>
        <div class="process-ribbon-line">
          <span class="process-pill" id="processing-process-pill"></span>
          <span class="process-state-badge" id="processing-process-state"></span>
        </div>
      </div>
      <button class="btn btn-ghost process-share-btn" id="processing-share-btn" onclick="copyShareLink(this)">
        <span class="share-btn-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>
        <span class="share-btn-label" data-i18n="share.copy"></span>
      </button>
    </div>

    <div class="pipeline">
      <div class="pipeline-node" id="pipe-upload">
        <div class="pipeline-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <span class="pipeline-label" data-i18n="pipeline.upload"></span>
      </div>
      <div class="pipeline-connector" id="conn-1"></div>
      <div class="pipeline-node" id="pipe-start">
        <div class="pipeline-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </div>
        <span class="pipeline-label" data-i18n="pipeline.process"></span>
      </div>
      <div class="pipeline-connector" id="conn-2"></div>
      <div class="pipeline-node" id="pipe-extract">
        <div class="pipeline-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <span class="pipeline-label" data-i18n="pipeline.extraction"></span>
      </div>
      <div class="pipeline-connector" id="conn-3"></div>
      <div class="pipeline-node" id="pipe-rank">
        <div class="pipeline-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </div>
        <span class="pipeline-label" data-i18n="pipeline.ranking"></span>
      </div>
    </div>

    <div class="processing-status">
      <div class="status-text" id="processing-status-text" data-i18n="processing.init"></div>
      <div class="elapsed" id="processing-elapsed">00:00</div>
      <div class="sub-text" id="processing-sub-text"></div>
    </div>

    <div class="task-outputs" id="task-outputs"></div>

    <div class="mt-24 text-center">
      <button class="btn btn-ghost hidden" id="btn-cancel" onclick="cancelPipeline()" data-i18n="btn.cancel"></button>
    </div>
  </section>

  <!-- ============================================================
       STEP 3: RESULTS
       ============================================================ -->
  <section class="section" id="section-results">
    <div id="results-warnings"></div>

    <!-- Toolbar: progress + controls -->
    <div class="results-toolbar" id="results-toolbar" style="display:none">
      <div class="toolbar-left">
        <div class="progress-wrap">
          <span class="progress-label" id="progress-label">0 / 0</span>
          <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="toolbar-right">
        <input type="text" class="item-search" id="item-search" placeholder="" oninput="filterItems(this.value)"/>
        <button class="btn-ghost toolbar-btn" onclick="toggleAllItems(true)" title=""><span id="expand-label"></span></button>
        <button class="btn-ghost toolbar-btn" onclick="toggleAllItems(false)" title=""><span id="collapse-label"></span></button>
        <button class="btn btn-ghost process-share-btn" id="results-share-btn" onclick="copyShareLink(this)">
          <span class="share-btn-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>
          <span class="share-btn-label" data-i18n="share.copy"></span>
        </button>
      </div>
    </div>

    <div id="results-items"></div>

    <div class="export-section" id="export-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 data-i18n="export.title"></h2>
        <span class="label" id="selection-count"></span>
      </div>
      <div class="export-summary" id="export-summary"></div>
      <div class="export-actions">
        <button class="btn btn-primary" onclick="downloadExport('csv')" data-i18n="export.csv"></button>

function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const text = t(key);
    if (el.tagName === 'OPTION') el.textContent = text;
    else el.textContent = text;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.getAttribute('data-i18n-title'));
  });
  // Update optgroup labels for system selection
  const ogEb = document.getElementById('optgroup-eb');
  const ogZb = document.getElementById('optgroup-zb');
  if (ogEb) ogEb.label = t('settings.system.group.eb');
  if (ogZb) ogZb.label = t('settings.system.group.zb');
  // Re-render dynamic parts while keeping interactive review state intact.
  if (state.results) {
    renderResults(state.results, { preserveState: true });
  }
  updateExportSummary();
  updatePipelineModeLabels();
  updateProcessRibbon();
  updateSessionDot();
}

function getCssPxVar(name, fallback) {
  const raw = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  const parsed = Number.parseFloat(raw);
  return Number.isFinite(parsed) ? parsed : fallback;
}

function getMatrixLayoutMetrics() {
  return {
    fname: getCssPxVar('--matrix-col-fname', 168),
    query: getCssPxVar('--matrix-col-query', 220),
    proposal: getCssPxVar('--matrix-col-proposal', 240),
  };
}

function renderSummaryBadge(count, labelKey, tooltipKey, cls) {
  return `<span class="qb ${cls}" title="${escapeHtml(t(tooltipKey))}">${count} ${escapeHtml(t(labelKey))}</span>`;
}

function debounce(fn, wait = 150) {
  let timeoutId = null;
  return (...args) => {
    window.clearTimeout(timeoutId);
    timeoutId = window.setTimeout(() => fn(...args), wait);
  };
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  applyLang();
}

// Compact catalog: [[Artikelnummer, ABAS-ID], …] — only published rows.
// Embedded so the page works with file:// and GitHub Pages without extra fetches.
// _CATALOG_FIELDS, _CATALOG_DICT, and _CATALOG_DATA are defined in docs/catalog.js,
// loaded via <script src="catalog.js"> earlier in the page. Regenerate with
// `node scripts/generate-catalog.js` after updating docs/product-catalog.csv.
function loadCatalog() {
  if (state.catalog) return;
  const byArticle = {};
  const published = [];
  _CATALOG_DATA.forEach(row => {
    const art = row[0];
    const abasId = row[1];
    const entry = { 'Artikelnummer': art, 'ABAS-ID': abasId };
    for (let i = 0; i < _CATALOG_FIELDS.length; i++) {
      const idx = row[2 + i];
      if (idx !== '' && idx !== undefined) {
        entry[_CATALOG_FIELDS[i]] = _CATALOG_DICT[idx];
      }
    }
    byArticle[art] = entry;
    published.push(entry);
  });
  state.catalog = { published, byArticle };
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function formatElapsed(ms) {

  return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

function translateUiTerm(value) {

function formatFieldLabel(name) {
  if (name === null || name === undefined) return '';

  return FIELD_LABEL_MAP.de[fullName] || FIELD_LABEL_MAP.de[shortField(fullName)] || shortField(fullName);

function formatLabelText(label) {

function formatCandidateType(candidateType) {

function getRouteState() {
  const url = new URL(window.location.href);

  return {
    processId: sanitizeProcessId(url.searchParams.get('process')),
    step: STEPS.includes(rawStep) ? rawStep : 'config',
  };

  return getRouteState().processId;

function buildRouteUrl(step = state.currentStep, processId = getRoutableProcessId()) {
  const url = new URL(window.location.href);
  if (processId) url.searchParams.set('process', processId);
  else url.searchParams.delete('process');
  url.hash = `#${step}`;
  return url;
}

function syncRoute({ step = state.currentStep, processId = getRoutableProcessId(), replace = false } = {}) {
  if (suppressRouteSync) return;
  const nextUrl = buildRouteUrl(step, processId);
  const next = `${nextUrl.pathname}${nextUrl.search}${nextUrl.hash}`;
  const current = `${window.location.pathname}${window.location.search}${window.location.hash || ''}`;
  if (next === current) return;
  window.history[replace ? 'replaceState' : 'pushState']({}, '', next);
}

function getProcessCacheKey(processId) {

function loadProcessCache(processId) {
  const normalized = sanitizeProcessId(processId);
  if (!normalized) return null;
  try {
    const raw = window.sessionStorage.getItem(getProcessCacheKey(normalized));
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || parsed.processId !== normalized) return null;
    return parsed;
  } catch (err) {
    return null;
  }
}

function persistProcessCache(processId, pipelineResponse = state.pipelineResponse, results = state.results) {
  const normalized = sanitizeProcessId(processId);
  if (!normalized) return;
  try {
    window.sessionStorage.setItem(getProcessCacheKey(normalized), JSON.stringify({
      processId: normalized,
      pipelineResponse: pipelineResponse || null,
      results: results || null,
      savedAt: new Date().toISOString(),
    }));
  } catch (err) {
    // Ignore session storage write failures.
  }
}

function isVerticallyScrollable(element) {
  if (!element) return false;
  const styles = getComputedStyle(element);
  return /(auto|scroll|overlay)/.test(styles.overflowY) && element.scrollHeight > element.clientHeight + 1;
}

function findOuterScrollTarget(element) {
  let current = element?.parentElement || null;
  while (current) {
    if (isVerticallyScrollable(current)) return current;
    current = current.parentElement;
  }
  return document.scrollingElement || document.documentElement;
}

function forwardMatrixScroll(deltaY, source) {
  const target = findOuterScrollTarget(source);
  if (!target) return false;
  const before = target === (document.scrollingElement || document.documentElement)
    ? window.scrollY
    : target.scrollTop;
  if (target === (document.scrollingElement || document.documentElement)) {
    window.scrollBy({ top: deltaY, behavior: 'auto' });
    return window.scrollY !== before;
  }
  target.scrollTop += deltaY;
  return target.scrollTop !== before;
}

function handleMatrixWheelChaining(event) {
  const wrapper = event.target.closest('.matrix-wrapper');
  if (!wrapper || Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return;
  const maxScrollTop = wrapper.scrollHeight - wrapper.clientHeight;
  if (maxScrollTop <= 0) return;
  const atTop = wrapper.scrollTop <= 1;
  const atBottom = wrapper.scrollTop >= maxScrollTop - 1;
  const pushingPastTop = event.deltaY < 0 && atTop;
  const pushingPastBottom = event.deltaY > 0 && atBottom;
  if (!pushingPastTop && !pushingPastBottom) return;
  if (forwardMatrixScroll(event.deltaY, wrapper)) event.preventDefault();
}

function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function seriesFromArticle(article) {
  if (!article) return null;
  const upper = String(article).toUpperCase();
  let best = null;
  for (const s of Object.keys(SERIES_MAP)) {
    // Try exact prefix first (e.g. KSU0 matches KSU003-EB100)
    if (upper.startsWith(s) && (!best || s.length > best.length)) best = s;
    // Also try without trailing digit (e.g. XGIU from XGIU0 matches XGIU411CPS)
    const stem = s.replace(/\d+$/, '');
    if (stem.length >= 2 && upper.startsWith(stem) && (!best || s.length > (best || '').length)) best = s;
  }
  return best;
}

  return 'mailto:michael.auth@rp-group.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);

function renderZubehoerContent(itemKey, proposals, selectedProposalIdx) {
  const selSet = state.accessorySelections[itemKey] || new Set();
  let series = null, articleName = null, pairedKeys = new Set();
  const isManualSel = typeof selectedProposalIdx === 'string' && selectedProposalIdx.startsWith('manual:');
  const hasSelection = typeof selectedProposalIdx === 'number' || isManualSel;
  if (typeof selectedProposalIdx === 'number' && proposals[selectedProposalIdx]) {
    const p = proposals[selectedProposalIdx];
    articleName = p.display_article || p.base_article || null;
    series = seriesFromArticle(articleName);
    // Extract accessory_keys from product_features — these are known pairings
    const ak = p.product_features?.accessory_keys;
    if (ak) {
      (typeof ak === 'string' ? ak.split('|') : Array.isArray(ak) ? ak : []).forEach(k => { if (k) pairedKeys.add(k.trim()); });
    }
  } else if (isManualSel) {
    const mi = parseInt(selectedProposalIdx.split(':')[1]);
    const manuals = state.manualProducts[itemKey] || [];
    if (manuals[mi]) {
      articleName = manuals[mi]['Artikelnummer'] || null;
      series = seriesFromArticle(articleName);
    }
  }
  let html = '<div class="zubehoer-header"><span class="zubehoer-title">' + t('zubehoer.title') + '</span>';
  if (series && articleName) html += '<span class="zubehoer-subtitle">' + escapeHtml(articleName) + ' · Reihe ' + escapeHtml(series) + '</span>';
  html += '</div>';
  if (!series || !SERIES_MAP[series]) {
    html += '<div class="zubehoer-empty">' + (hasSelection ? t('zubehoer.none') : t('zubehoer.select_first')) + '</div>';
    return html;
  }
  const accKeys = SERIES_MAP[series];
  const byCategory = {};
  accKeys.forEach(key => {
    const det = ACC_DETAILS[key]; if (!det) return;
    const cat = det.cat || 'Sonstige';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(key);
  });
  // Sort categories: EX-Pflicht first (mandatory safety), then by defined order
  const sortedCats = Object.entries(byCategory).sort(([a], [b]) => {
    return (CAT_SORT_ORDER[a] ?? 99) - (CAT_SORT_ORDER[b] ?? 99);
  });
  const ek = itemKey.replace(/'/g, "\\'");
  sortedCats.forEach(([cat, keys]) => {
    // Within each category: paired/known accessories first, then rest
    const sorted = [...keys].sort((a, b) => {
      const aPaired = pairedKeys.has(a) ? 0 : 1;
      const bPaired = pairedKeys.has(b) ? 0 : 1;
      return aPaired - bPaired;
    });
    const isEX = cat === '6 EX-Pflichtzubehoer';
    const catClass = isEX ? ' zubehoer-cat-mandatory' : '';
    html += '<div class="zubehoer-cat-block' + catClass + '"><div class="zubehoer-cat-label">' + escapeHtml(catLabel(cat)) + (isEX ? ' ⚠' : '') + '</div><div class="zubehoer-items">';
    sorted.forEach(key => {
      const det = ACC_DETAILS[key] || {};
      const isSel = selSet.has(key);
      const isPaired = pairedKeys.has(key);
      const ek2 = key.replace(/'/g, "\\'");
      html += '<div class="zc-wrapper' + (isSel ? ' zc-wrapper-selected' : '') + '">';
      html += '<button class="zubehoer-chip' + (isSel ? ' zc-selected' : '') + (isPaired ? ' zc-paired' : '') + '" onclick="toggleAccessory(\'' + ek + '\',\'' + ek2 + '\')" title="' + escapeHtml(det.d || key) + (isPaired ? ' — ' + t('zubehoer.paired') : '') + '">'
        + '<span class="zc-check">' + (isSel ? '✓' : '') + '</span>'
        + '<span class="zc-keyline">'
        + '<span class="zc-key">' + escapeHtml(key) + '</span>'
        + (isPaired ? '<span class="zc-paired-badge">★</span>' : '')
        + '</span>'
        + '<span class="zc-desc">' + escapeHtml(det.d || '') + '</span>'
        + (det.fa ? '<span class="zc-fa">' + escapeHtml(det.fa) + '</span>' : '')
        + '</button>';
      // Show detail panel when selected
      if (isSel) {
        html += '<div class="zc-detail">';
        html += '<div class="zc-detail-row"><span class="zc-detail-label">Key:</span><span class="zc-detail-val">' + escapeHtml(key) + '</span></div>';
        if (det.d) html += '<div class="zc-detail-row"><span class="zc-detail-label">' + (currentLang === 'de' ? 'Beschreibung' : 'Description') + ':</span><span class="zc-detail-val">' + escapeHtml(det.d) + '</span></div>';
        if (det.cat) html += '<div class="zc-detail-row"><span class="zc-detail-label">' + (currentLang === 'de' ? 'Kategorie' : 'Category') + ':</span><span class="zc-detail-val">' + escapeHtml(catLabel(det.cat)) + '</span></div>';
        if (det.fa) html += '<div class="zc-detail-row"><span class="zc-detail-label">' + (currentLang === 'de' ? 'Farbe' : 'Color') + ':</span><span class="zc-detail-val">' + escapeHtml(det.fa) + '</span></div>';
        if (det.me) html += '<div class="zc-detail-row"><span class="zc-detail-label">' + (currentLang === 'de' ? 'Montageeffekt' : 'Mounting Effect') + ':</span><span class="zc-detail-val">' + escapeHtml(det.me) + '</span></div>';
        if (isPaired) html += '<div class="zc-detail-row"><span class="zc-detail-label">Status:</span><span class="zc-detail-val" style="color:#15803D">★ ' + t('zubehoer.paired') + '</span></div>';
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

function toggleAccessory(itemKey, accKey) {
  if (!state.accessorySelections[itemKey]) state.accessorySelections[itemKey] = new Set();
  const set = state.accessorySelections[itemKey];
  if (set.has(accKey)) set.delete(accKey); else set.add(accKey);
  const panel = document.getElementById('zubehoer-' + itemKey);
  if (panel) {
    const item = (state.results?.items || []).find(i => (i.positionsnummer || i.item_id) === itemKey);
    if (item) panel.innerHTML = renderZubehoerContent(itemKey, item.proposals || [], state.selections[itemKey]);
  }
}

function apiHeaders(contentType) {
  const h = { 'Authorization': `Bearer ${state.apiKey}`, 'accept': 'application/json' };
  if (contentType) h['Content-Type'] = contentType;
  return h;
}

async function uploadFile(file, signal) {
  const url = `${API_BASE}/storage/upload/file?storageType=BLOB&spaceId=${SPACE_ID}`;
  const form = new FormData();
  form.append('file', file, file.name);
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${state.apiKey}`, 'accept': 'application/json, text/plain, */*' },
    body: form, signal,
  });
  if (!resp.ok) throw new Error(`${t('upload_failed')}: ${resp.status} ${resp.statusText}`);
  return (await resp.text()).trim();
}

function toApiMaterialFilter(value) {
  const materialFilterMap = {
    all: 'all',
    kunststoff: 'plastic_only',
    metall: 'metal_only',
    plastic_only: 'plastic_only',
    metal_only: 'metal_only',
  };
  return materialFilterMap[value] || 'all';
}

async function startProcess(blobUrl, signal) {
  const url = `${API_BASE}/v1/m2m/processes`;
  const payload = {
    processTemplate: PROCESS_TEMPLATE_ID, spaceId: SPACE_ID, private: false,
    inputs: [
      { name: 'ANFRAGE', value: blobUrl },
      { name: 'TOP_K', value: $('setting-topk').value },
      { name: 'MATERIAL_FILTER', value: toApiMaterialFilter($('setting-material').value) },
      { name: 'USE_VIRTUAL_ITEMS', value: $('setting-virtual').value },
      { name: 'SYSTEM_SELECTION', value: $('setting-system').value },
    ],
  };
  const resp = await fetch(url, {
    method: 'POST', headers: apiHeaders('application/json'),
    body: JSON.stringify(payload), signal,
  });
  if (!resp.ok) throw new Error(`${t('process_failed')}: ${resp.status} ${resp.statusText}`);
  return (await resp.json()).id;
}

async function pollOutputs(processId, signal) {
  const url = `${API_BASE}/processes/${processId}/tasks/outputs`;
  const resp = await fetch(url, { headers: apiHeaders(), signal });
  if (!resp.ok) throw new Error(`${t('poll_failed')}: ${resp.status} ${resp.statusText}`);
  return resp.json();
}

function prepareProcessingRun({ source = 'api', processId = '', replaceHistory = false } = {}) {
  if (state.processing.abortController) state.processing.abortController.abort();
  state.processing.error = null;
  state.processing.blobUrl = null;
  state.processing.processId = processId || null;
  state.processing.source = source;
  state.processing.liveState = processId ? 'live' : 'idle';
  state.processing.abortController = new AbortController();
  resetPipelineUi();
  goToStep('processing', { replaceHistory });
  startTimer();
  updateProcessRibbon(processId ? 'live' : 'idle');
  return state.processing.abortController.signal;
}

function applyResumePipelineSnapshot(data) {
  const tasks = data.outputs || [];
  setPipelineNode('pipe-upload', 'done');
  setConnector('conn-1', 'filled');
  setPipelineNode('pipe-start', 'done');
  setConnector('conn-2', 'filled');
  if (tasks.length >= 2) {
    setPipelineNode('pipe-extract', 'done');
    setConnector('conn-3', data.totalExecutionTime != null ? 'filled' : 'active');
    setPipelineNode('pipe-rank', data.totalExecutionTime != null ? 'done' : 'active');
  } else {
    setPipelineNode('pipe-extract', 'active');
  }
}

function renderProcessingSnapshot(processId, data, { liveState = 'cached' } = {}) {
  stopTimer();
  stopPhraseRotation();
  resetPipelineUi();
  state.processing.source = 'resume';
  state.processing.processId = processId || null;
  state.processing.liveState = liveState;
  updatePipelineModeLabels();
  updateProcessRibbon(liveState);

  if (!data) {
    $('processing-status-text').textContent = t('processing.resume_waiting_key');
    $('processing-sub-text').textContent = processId ? `Process ${processId}` : '';
    return;
  }

  const tasks = data.outputs || [];
  applyResumePipelineSnapshot(data);
  tasks.forEach(task => {
    addTaskOutput(task.taskName || task.identifier || '?', task.outputText || '', 'done');
  });

  if (data.totalExecutionTime != null) {
    $('processing-status-text').textContent = t('processing.resume_cached');
    $('processing-sub-text').textContent = `${tasks.length} ${t('processing.tasks')} \u2014 ${(data.totalExecutionTime / 1000).toFixed(1)}s ${t('processing.total_time')}`;
    $('btn-cancel').classList.add('hidden');
    return;
  }

  $('processing-status-text').textContent = t('processing.resume_watch');
  $('processing-sub-text').textContent = `Process ${processId} \u2014 ${tasks.length} ${t('processing.tasks_completed')}`;
}

function finalizeProcessResults(processId, data, { liveState = 'live', targetStep = 'results' } = {}) {
  const finalJson = parseResultPayload(data);
  state.pipelineResponse = data;
  state.results = finalJson;
  state.processing.liveState = liveState;
  setActiveProcessId(processId);
  persistProcessCache(processId, data, finalJson);
  renderResults(finalJson);
  updateProcessRibbon(liveState);
  goToStep(targetStep === 'export' ? 'export' : 'results');
}

async function watchExistingProcess(processId, { initialData = null, replaceHistory = false } = {}) {
  const normalized = sanitizeProcessId(processId);
  const signal = prepareProcessingRun({ source: 'resume', processId: normalized, replaceHistory });
  let data = initialData;
  let lastTaskCount = 0;

  $('processing-status-text').textContent = t('processing.resume_connecting');
  $('processing-sub-text').textContent = `Process ${normalized}`;

  try {
    startPhraseRotation();
    const deadline = Date.now() + MAX_POLL_TIME;

    while (Date.now() < deadline) {
      if (signal.aborted) throw new Error('Aborted');
      if (!data) {
        await new Promise(r => setTimeout(r, POLL_INTERVAL));
        data = await pollOutputs(normalized, signal);
      }

      const tasks = data.outputs || [];
      while (lastTaskCount < tasks.length) {
        const tk = tasks[lastTaskCount];
        addTaskOutput(tk.taskName || tk.identifier || '?', tk.outputText || '', 'done');
        lastTaskCount++;
      }

      applyResumePipelineSnapshot(data);
      persistProcessCache(normalized, data, null);

      if (data.failed) throw new Error(t('process_error'));

      if (data.totalExecutionTime != null) {
        stopPhraseRotation();
        $('processing-status-text').textContent = t('processing.done');
        $('processing-sub-text').textContent = `${tasks.length} ${t('processing.tasks')} \u2014 ${(data.totalExecutionTime / 1000).toFixed(1)}s ${t('processing.total_time')}`;
        stopTimer();
        $('btn-cancel').classList.add('hidden');
        finalizeProcessResults(normalized, data, { liveState: 'live' });
        return;
      }

      $('processing-status-text').textContent = t('processing.resume_watch');
      $('processing-sub-text').textContent = `Process ${normalized} \u2014 ${tasks.length} ${t('processing.tasks_completed')}`;
      data = null;
    }

    throw new Error(`${t('timeout_after')} ${MAX_POLL_TIME / 1000}s`);
  } catch (err) {
    stopTimer();
    stopPhraseRotation();
    $('btn-cancel').classList.add('hidden');
    if (err.name === 'AbortError') {
      $('processing-status-text').textContent = t('processing.cancelled');
      $('processing-sub-text').textContent = '';
      return;
    }
    setPipelineNode('pipe-rank', 'error');
    $('processing-status-text').textContent = t('processing.error');
    $('processing-sub-text').innerHTML = `<span style="color:var(--red-400)">${escapeHtml(err.message)}</span>`;
  }
}

async function startNewProcess() {
  setActiveProcessId('');
  state.pipelineResponse = null;
  state.results = null;
  const signal = prepareProcessingRun({ source: 'api' });

  try {
    // STEP 1: Upload
    setPipelineNode('pipe-upload', 'active');
    $('processing-status-text').textContent = `${t('processing.uploading')}: ${state.file.name}`;
    $('processing-sub-text').textContent = t('processing.wait');
    const blobUrl = await uploadFile(state.file, signal);
    state.processing.blobUrl = blobUrl;
    setPipelineNode('pipe-upload', 'done');
    setConnector('conn-1', 'filled');
    addTaskOutput('Upload', `Blob URL: ${blobUrl}`, 'done');

    // STEP 2: Start process
    setPipelineNode('pipe-start', 'active');
    $('processing-status-text').textContent = t('processing.starting');
    $('processing-sub-text').textContent = `Template ${PROCESS_TEMPLATE_ID}`;
    const processId = await startProcess(blobUrl, signal);
    setActiveProcessId(processId);
    state.processing.processId = processId;
    state.processing.liveState = 'live';
    setPipelineNode('pipe-start', 'done');
    setConnector('conn-2', 'active');
    addTaskOutput('Process Start', `Process ID: ${processId}`, 'done');
    persistProcessCache(processId, null, null);
    syncRoute({ step: 'processing', processId, replace: true });

    // STEP 3-4: Poll
    setPipelineNode('pipe-extract', 'active');
    $('processing-sub-text').textContent = `Process ${processId}`;
    startPhraseRotation();
    const deadline = Date.now() + MAX_POLL_TIME;
    let lastTaskCount = 0;

    while (Date.now() < deadline) {
      if (signal.aborted) throw new Error('Aborted');
      await new Promise(r => setTimeout(r, POLL_INTERVAL));
      const data = await pollOutputs(processId, signal);
      const tasks = data.outputs || [];
      const failed = !!data.failed;
      const done = data.totalExecutionTime != null;

      while (lastTaskCount < tasks.length) {
        const tk = tasks[lastTaskCount];
        addTaskOutput(tk.taskName || tk.identifier || '?', tk.outputText || '', 'done');
        lastTaskCount++;
      }

      if (tasks.length >= 2) {
        setPipelineNode('pipe-extract', 'done');
        setConnector('conn-2', 'filled');
        setConnector('conn-3', 'active');
        setPipelineNode('pipe-rank', 'active');
      }

      persistProcessCache(processId, data, state.results);

      if (failed) throw new Error(t('process_error'));

      if (done) {
        setPipelineNode('pipe-extract', 'done');
        setPipelineNode('pipe-rank', 'done');
        setConnector('conn-2', 'filled');
        setConnector('conn-3', 'filled');
        stopPhraseRotation();
        $('processing-status-text').textContent = t('processing.done');
        $('processing-sub-text').textContent = `${tasks.length} ${t('processing.tasks')} \u2014 ${(data.totalExecutionTime / 1000).toFixed(1)}s ${t('processing.total_time')}`;
        stopTimer();
        $('btn-cancel').classList.add('hidden');
        finalizeProcessResults(processId, data, { liveState: 'live' });
        return;
      }
      $('processing-sub-text').textContent = `Process ${processId} \u2014 ${tasks.length} ${t('processing.tasks_completed')}`;
    }
    throw new Error(`${t('timeout_after')} ${MAX_POLL_TIME / 1000}s`);

  } catch (err) {
    stopTimer();
    stopPhraseRotation();
    $('btn-cancel').classList.add('hidden');
    if (err.name === 'AbortError') {
      $('processing-status-text').textContent = t('processing.cancelled');
      $('processing-sub-text').textContent = '';
      return;
    }
    const isCors = err.message.includes('Failed to fetch') || err.message.includes('NetworkError');
    if (!state.processing.blobUrl) setPipelineNode('pipe-upload', 'error');
    else if (!state.processing.processId) setPipelineNode('pipe-start', 'error');
    else setPipelineNode('pipe-rank', 'error');

    $('processing-status-text').textContent = t('processing.error');
    const errMsg = isCors ? t('processing.cors') : err.message;
    $('processing-sub-text').innerHTML = `<span style="color:var(--red-400)">${escapeHtml(errMsg)}</span>`;
    const backBtn = document.createElement('button');
    backBtn.className = 'btn btn-secondary mt-16';
    backBtn.textContent = t('btn.back');
    backBtn.onclick = () => goToStep('config');
    $('processing-sub-text').appendChild(document.createElement('br'));
    $('processing-sub-text').appendChild(backBtn);
  }
}

function cancelPipeline() {
  if (state.processing.abortController) state.processing.abortController.abort();
  stopTimer();
  stopPhraseRotation();
  setTimeout(() => goToStep('config'), 500);
}

async function startResumeFromInput(options = {}) {
  const processId = sanitizeProcessId(options.processId || $('resume-process-input')?.value);
  if (!processId) {
    setResumeStatus(t('resume.enter_process'), 'error');
    return;
  }

  const previousProcessId = state.activeProcessId;
  setMode('resume', { updateHistory: false });
  setActiveProcessId(processId);
  setResumeStatus('');
  if (options.syncHistory !== false) syncRoute({ step: 'config', processId, replace: true });

  const targetStep = options.targetStep || getRouteState().step;
  const cached = loadProcessCache(processId);
  const hasCachedResults = Boolean(cached?.results);
  const switchedProcess = Boolean(previousProcessId && previousProcessId !== processId);

  if (switchedProcess && !hasCachedResults) {
    state.pipelineResponse = null;
    state.results = null;
  }

  if (hasCachedResults && targetStep === 'processing') {
    hydrateCachedProcess(cached, { render: false });
    renderProcessingSnapshot(processId, cached.pipelineResponse, { liveState: 'cached' });
    goToStep('processing', { updateHistory: false });
  } else if (hasCachedResults) {
    hydrateCachedProcess(cached);
    goToStep(targetStep === 'export' ? 'export' : 'results', { updateHistory: false });
  }

  if (!state.apiKey) {
    if (!hasCachedResults) {
      state.processing.liveState = 'idle';
      updateProcessRibbon('idle');
      setResumeStatus(t('processing.resume_waiting_key'), 'success');
      goToStep('config', { updateHistory: false, replaceHistory: true });
    }
    return;
  }

  try {
    const snapshot = options.initialData || await pollOutputs(processId, new AbortController().signal);
    persistProcessCache(processId, snapshot, cached?.results || null);

    if (snapshot.failed) throw new Error(t('process_error'));

    if (snapshot.totalExecutionTime != null) {
      state.processing.liveState = 'live';
      finalizeProcessResults(processId, snapshot, { liveState: 'live', targetStep });
      return;
    }

    await watchExistingProcess(processId, { initialData: snapshot, replaceHistory: true });
  } catch (err) {
    if (hasCachedResults) return;
    state.processing.liveState = 'idle';
    updateProcessRibbon('idle');
    goToStep('config', { updateHistory: false, replaceHistory: true });
    setResumeStatus(`${t('resume.resume_failed')}: ${err.message}`, 'error');
  }
}

function updateProgressBar() {
  if (!state.results) return;
  const items = state.results.items || [];
  const total = items.length;
  let reviewed = 0;
  items.forEach(item => {
    const key = item.positionsnummer || item.item_id;
    if (state.selections[key] !== null && state.selections[key] !== undefined) reviewed++;

  if (lbl) lbl.textContent = `${reviewed} / ${total} ${t('progress.reviewed')}`;
  if (fill) fill.style.width = pct + '%';

function renderReasonCodes(codes, limit = null) {
  if (!codes || !codes.length) return '';
  const tags = codes.map(c => {
    const info = REASON_LABELS[c];
    if (info === null) return ''; // suppressed
    const label = info ? info[0] : c.replace(/_/g, ' ');
    const cls = info && info[1] === 'match' ? 'rc-match' : info && info[1] === 'upgrade' ? 'rc-upgrade' : '';
    return `<span class="reason-tag ${cls}">${escapeHtml(formatLabelText(label))}</span>`;
  }).filter(Boolean);
  const visibleTags = limit != null ? tags.slice(0, limit) : tags;
  if (limit != null && tags.length > limit) {
    visibleTags.push(`<span class="reason-tag">+${tags.length - limit}</span>`);
  }
  return visibleTags.length ? `<div class="ph-reasons">${visibleTags.join('')}</div>` : '';
}

function getAnfrageIndex() {
  const outputs = state.pipelineResponse?.outputs || [];
  for (const task of outputs) {
    try {
      const parsed = JSON.parse(task.outputText || '');
      if (Array.isArray(parsed?.Produkte)) {
        return Object.fromEntries(
          parsed.Produkte.map(p => [String(p.Positionsnummer), p])
        );
      }
    } catch {}
  }
  return null;
}

function renderAnfragePanel(key, queryFields, anfrageIndex) {
  const anfrageItem = anfrageIndex?.[String(key)] || null;
  const panelId = 'anfrage-' + String(key).replace(/[^a-zA-Z0-9]/g, '_');
  const qf = queryFields || [];

  // Top metadata (only available from full anfrage)
  const conf = anfrageItem?.ExtractionConfidence ?? null;
  const confPct = conf !== null ? Math.round(conf * 100) : null;
  const hard = Array.isArray(anfrageItem?.['ConstraintProfile:Hard']) ? anfrageItem['ConstraintProfile:Hard'] : [];
  const soft = Array.isArray(anfrageItem?.['ConstraintProfile:Soft']) ? anfrageItem['ConstraintProfile:Soft'] : [];
  const evidenceQf = qf.find(f => f.field === 'Evidence');
  let evidence = [];
  if (Array.isArray(anfrageItem?.Evidence)) {
    evidence = anfrageItem.Evidence;
  } else if (anfrageItem?.Evidence) {
    evidence = String(anfrageItem.Evidence).split(',').map(s => s.trim()).filter(Boolean);
  } else if (evidenceQf?.value) {
    evidence = String(evidenceQf.value).split(',').map(s => s.trim()).filter(Boolean);
  }

  let topHtml = '';
  if (anfrageItem?.Verkaufstext) {
    const vt = anfrageItem.Verkaufstext;
    const preview = vt.length > 120 ? escapeHtml(vt.slice(0, 120)) + '\u2026' : escapeHtml(vt);
    topHtml += `<div class="anfrage-source-text"><span class="anfrage-section-label">${t('anfrage.source_text')}</span><details class="anfrage-text-details"><summary>${preview}</summary><pre class="anfrage-text-pre">${escapeHtml(vt)}</pre></details></div>`;
  }
  if (confPct !== null) {
    const confClass = confPct >= 90 ? 'high' : confPct >= 70 ? 'mid' : 'low';
    topHtml += `<div class="anfrage-confidence ${confClass}">\u25CF ${t('anfrage.confidence')}: ${confPct}%</div>`;
  }
  const warnings = Array.isArray(anfrageItem?.Warnings) ? anfrageItem.Warnings : [];
  if (warnings.length > 0) {
    topHtml += `<div class="anfrage-warn-row"><span class="anfrage-section-label">${t('anfrage.warnings')}</span>${warnings.map(w => `<span class="anfrage-warn-badge">\u26A0 ${escapeHtml(String(w))}</span>`).join('')}</div>`;
  }
  if (hard.length > 0 || soft.length > 0) {
    topHtml += '<div class="anfrage-constraints">';
    if (hard.length > 0) {
      topHtml += `<div class="anfrage-constraint-row"><span class="anfrage-constraint-label">${t('anfrage.hard')}</span>`;
      hard.forEach(v => { topHtml += `<span class="constraint-badge constraint-badge-hard">${escapeHtml(String(v))}</span>`; });
      topHtml += '</div>';
    }
    if (soft.length > 0) {
      topHtml += `<div class="anfrage-constraint-row"><span class="anfrage-constraint-label">${t('anfrage.soft')}</span>`;
      soft.forEach(v => { topHtml += `<span class="constraint-badge constraint-badge-soft">${escapeHtml(String(v))}</span>`; });
      topHtml += '</div>';
    }
    topHtml += '</div>';
  }
  if (evidence.length > 0) {
    topHtml += `<div class="anfrage-evidence-label">${t('anfrage.evidence')}</div>`;
    topHtml += `<div class="anfrage-evidence">${evidence.map(e => escapeHtml(String(e))).join(' \u00B7 ')}</div>`;
  }

  // Field table
  const EXCLUDED = new Set(['Positionsnummer', 'Verkaufstext', 'Evidence', 'Warnings']);
  const fieldMap = {};
  qf.forEach(f => {
    if (!EXCLUDED.has(f.field)) {
      fieldMap[f.field] = { value: f.value, source: f.source };
    }
  });
  // Augment with all non-null fields from full anfrage not present in query_fields
  const ANFRAGE_META = new Set([
    'Positionsnummer', 'Artikelnummer', 'EAN code', 'Produkttyp',
    'Verkaufstext', 'Evidence', 'Warnings',
    'ConstraintProfile:Hard', 'ConstraintProfile:Soft', 'ExtractionConfidence',
    'Accessory:Candidates', 'Lieferländer-id'
  ]);
  if (anfrageItem) {
    Object.entries(anfrageItem).forEach(([f, v]) => {
      if (!ANFRAGE_META.has(f) && !(f in fieldMap) && v !== null && v !== undefined) {
        fieldMap[f] = { value: v, source: null };
      }
    });
  }

  if (Object.keys(fieldMap).length === 0 && !topHtml) return '';

  // Group fields
  const groups = {};
  Object.entries(fieldMap).forEach(([fname, fdata]) => {
    let grp = getFieldGroup(fname);
    if (!groups[grp]) groups[grp] = [];
    groups[grp].push({ fname, ...fdata });
  });

  const GROUP_ORDER = ['fg.identity', 'fg.mounting', 'fg.protection', 'fg.dimensions', 'fg.electrical', 'fg.material', 'fg.anfrage_extra', 'fg.other'];
  let tableHtml = '';
  GROUP_ORDER.forEach(grpKey => {
    const fields = groups[grpKey];
    if (!fields || fields.length === 0) return;
    tableHtml += `<tr class="afr-group"><td colspan="3">${t(grpKey)}</td></tr>`;
    fields.forEach(({ fname, value, source }) => {
      const isEmpty = value === null || value === undefined || value === '' || value === '-';
      const displayVal = isEmpty ? '\u2014' : escapeHtml(String(value));
      const valClass = isEmpty ? 'afr-fval missing' : 'afr-fval';
      const safeSrc = source && /^[a-z]+$/.test(source) ? source : '';
      const badgeHtml = (!isEmpty && safeSrc) ? `<span class="afr-badge ${safeSrc}">${safeSrc}</span>` : '';
      tableHtml += `<tr><td class="afr-fname">${escapeHtml(fname)}</td><td class="${valClass}">${displayVal}</td><td>${badgeHtml}</td></tr>`;
    });
  });

  const tableSection = tableHtml ? `<table class="anfrage-field-table">${tableHtml}</table>` : '';

  return `<div class="anfrage-panel">
    <button class="anfrage-toggle" onclick="event.stopPropagation();document.getElementById('${panelId}').classList.toggle('open');this.textContent=(document.getElementById('${panelId}').classList.contains('open')?'\\u25BE':'\\u25B8')+' ${t('anfrage.toggle')}'">
      \u25B8 ${t('anfrage.toggle')}
    </button>
    <div class="anfrage-body" id="${panelId}">
      ${topHtml}
      ${tableSection}
    </div>
  </div>`;
}

      });
